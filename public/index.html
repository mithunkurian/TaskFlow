function populateKanbanCatSelect(){
  const sel=document.getElementById('kanban-cat-sel');
  const prev=sel.value;
  sel.innerHTML=state.categories.map(c=>`<option value="${c}">${c}</option>`).join('');
  if(prev&&state.categories.includes(prev)) sel.value=prev;
}

window.renderKanban=function(){
  const board=document.getElementById('kanban-board');
  const sel=document.getElementById('kanban-cat-sel');
  const cat=sel?sel.value:state.categories[0];
  if(!cat){
    board.innerHTML=`<div class="kb-no-cat"><div class="big">⊞</div><p>No categories found.<br/>Add categories in Settings.</p></div>`;
    return;
  }

  // all active (non-trashed) tasks
  const activeTasks=state.tasks.filter(t=>!t.trashed);

  // collect all unique tag values for the chosen category
  const tagVals=getAllTagValues(cat);

  // also include an "Untagged" column for tasks with no value in this category
  const untaggedTasks=activeTasks.filter(t=>!(t.tags[cat]&&t.tags[cat].length>0));

  // update filter note
  const note=document.getElementById('kanban-filter-note');
  const filterCount=Object.keys(state.filters).length;
  if(note) note.textContent=filterCount>0?`${filterCount} filter${filterCount>1?'s':''} active — shown tasks are filtered`:'';

  if(!tagVals.length && !untaggedTasks.length){
    board.innerHTML=`<div class="kb-no-cat"><div class="big">◈</div><p>No tags in <strong>${cat}</strong> yet.<br/>Add tags via Settings or a task's detail panel.</p></div>`;
    return;
  }

  let html='';

  // one column per tag value
  tagVals.forEach(val=>{
    const c=getTagColor(cat,val);
    let colTasks=activeTasks.filter(t=>(t.tags[cat]||[]).includes(val));
    if(isFilterActive()) colTasks=colTasks.filter(t=>taskMatchesFilters(t));
    html+=buildKanbanCol(val,c.border,colTasks,cat,val);
  });

  // untagged column — colVal='' means no tag
  if(untaggedTasks.length>0){
    let colTasks=untaggedTasks;
    if(isFilterActive()) colTasks=colTasks.filter(t=>taskMatchesFilters(t));
    html+=buildKanbanCol('(Untagged)','var(--border2)',colTasks,cat,'');
  }

  board.innerHTML=html;

  // update select in case categories changed
  populateKanbanCatSelect();
  if(sel) sel.value=cat;
};

function buildKanbanCol(colTitle, dotColor, tasks, activeCat, colVal){
  const sorted=[...tasks].sort((a,b)=>{
    if(a.done===b.done) return (a.createdAt||0)-(b.createdAt||0);
    return a.done?1:-1;
  });

  let cardsHtml='';
  if(!sorted.length){
    cardsHtml=`<div class="kb-empty-col">Drop tasks here</div>`;
  } else {
    sorted.forEach(t=>{
      const subCount=getChildren(t.id).length;
      const subDone=getChildren(t.id).filter(c=>c.done).length;
      let tagsHtml='';
      state.categories.forEach(cat=>{
        if(cat===activeCat) return;
        (t.tags[cat]||[]).forEach(val=>{
          const tc=getTagColor(cat,val);
          tagsHtml+=`<span class="task-tag" style="border-left-color:${tc.accent};"><span class="cat">${cat.substring(0,3)}·</span>${val}</span>`;
        });
      });
      const isActive=state.activeTaskId===t.id;
      const ancestors=getAncestors(t.id);
      const pathHtml=ancestors.length>0
        ?`<div class="kb-card-path">${ancestors.map(a=>`<span class="kb-path-seg" onclick="event.stopPropagation();kbSelectTask('${a.id}')" title="${esc(a.text)}">${esc(a.text)}</span>`).join('<span class="kb-path-sep">›</span>')}<span class="kb-path-sep">›</span></div>`
        :'';
      cardsHtml+=`<div class="kb-card${t.done?' done':''}${isActive?' active':''}"
        draggable="true"
        data-task-id="${t.id}"
        data-col-val="${esc(colVal||'')}"
        data-cat="${esc(activeCat)}"
        onclick="kbSelectTask('${t.id}')"
        ondragstart="kbDragStart(event)"
        ondragend="kbDragEnd(event)">
        <div style="display:flex;align-items:flex-start;gap:9px;">
          <div class="kb-card-check${t.done?' on':''}" onclick="event.stopPropagation();kbToggleDone('${t.id}')">${t.done?'✓':''}</div>
          <div style="flex:1;min-width:0;">
            ${pathHtml}
            <div class="kb-card-title${t.done?' done':''}">${esc(t.text)}</div>
            ${tagsHtml?`<div class="kb-card-tags">${tagsHtml}</div>`:''}
            ${subCount>0?`<div class="kb-card-meta"><span class="sub-badge">↳ ${subDone}/${subCount} sub</span></div>`:''}
          </div>
        </div>
      </div>`;
    });
  }

  // data-col-val on the body for drop targeting
  return`<div class="kb-col">
    <div class="kb-col-header">
      <div class="kb-col-title">
        <span class="col-dot" style="background:${dotColor};box-shadow:0 0 6px ${dotColor}44;"></span>
        ${esc(colTitle)}
        <span class="kb-col-count">${tasks.length}</span>
      </div>
    </div>
    <div class="kb-col-body"
      data-col-val="${esc(colVal||'')}"
      data-cat="${esc(activeCat)}"
      ondragover="kbColDragOver(event)"
      ondragleave="kbColDragLeave(event)"
      ondrop="kbColDrop(event)">
      ${cardsHtml}
    </div>
  </div>`;
}

// ── KANBAN DRAG & DROP ───────────────────────────────────────────
let kbDrag = {
  taskId: null,
  fromColVal: null,
  cat: null,
  isCtrl: false,
};

window.kbDragStart = function(e){
  const card = e.currentTarget;
  kbDrag.taskId   = card.dataset.taskId;
  kbDrag.fromColVal = card.dataset.colVal;
  kbDrag.cat      = card.dataset.cat;
  kbDrag.isCtrl   = e.ctrlKey || e.metaKey;

  e.dataTransfer.effectAllowed = kbDrag.isCtrl ? 'copy' : 'move';
  e.dataTransfer.setData('text/plain', kbDrag.taskId);

  // slight delay so card doesn't immediately look dragged
  setTimeout(()=>card.classList.add('kb-dragging'), 0);

  updateCopyBadge(kbDrag.isCtrl, e);
};

window.kbDragEnd = function(e){
  e.currentTarget.classList.remove('kb-dragging');
  hideCopyBadge();
  // clear all drag-over states
  document.querySelectorAll('.kb-col-body').forEach(b=>b.classList.remove('kb-drag-over'));
};

window.kbColDragOver = function(e){
  e.preventDefault();
  // re-check ctrl in case user toggled mid-drag
  kbDrag.isCtrl = e.ctrlKey || e.metaKey;
  e.dataTransfer.dropEffect = kbDrag.isCtrl ? 'copy' : 'move';
  e.currentTarget.classList.add('kb-drag-over');
  updateCopyBadge(kbDrag.isCtrl, e);
};

window.kbColDragLeave = function(e){
  // only remove if leaving the column body (not entering a child)
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove('kb-drag-over');
  }
};

window.kbColDrop = function(e){
  e.preventDefault();
  e.currentTarget.classList.remove('kb-drag-over');
  hideCopyBadge();

  const toColVal  = e.currentTarget.dataset.colVal;
  const cat       = e.currentTarget.dataset.cat;
  const taskId    = kbDrag.taskId;
  const fromColVal= kbDrag.fromColVal;
  const isCopy    = e.ctrlKey || e.metaKey || kbDrag.isCtrl;

  if(!taskId || !cat) return;
  // dropping onto same column → no-op
  if(toColVal === fromColVal) return;

  const t = getTask(taskId);
  if(!t) return;

  const currentTags = [...(t.tags[cat] || [])];

  if(isCopy){
    // COPY: add the new tag while keeping old one(s)
    if(toColVal && !currentTags.includes(toColVal)){
      currentTags.push(toColVal);
      getTagColor(cat, toColVal); // ensure color registered
    }
    updateTask(taskId, {tags: {...t.tags, [cat]: currentTags}});
  } else {
    // MOVE: replace old col tag with new col tag
    let newTags;
    if(!toColVal){
      // dropped into Untagged — remove old col tag entirely
      newTags = currentTags.filter(v => v !== fromColVal);
    } else {
      // swap fromColVal → toColVal (if task had fromColVal); else just add toColVal
      if(currentTags.includes(fromColVal)){
        newTags = currentTags.map(v => v === fromColVal ? toColVal : v);
      } else {
        newTags = [...currentTags.filter(v=>v!==toColVal), toColVal];
      }
      getTagColor(cat, toColVal);
    }
    updateTask(taskId, {tags: {...t.tags, [cat]: newTags}});
  }
};

// track Ctrl key globally for mid-drag toggle
document.addEventListener('keydown', e=>{
  if((e.key==='Control'||e.key==='Meta') && kbDrag.taskId){
    kbDrag.isCtrl=true;
    document.body.classList.add('kb-copy-mode');
    updateCopyBadgeFromLastEvent(true);
  }
});
document.addEventListener('keyup', e=>{
  if(e.key==='Control'||e.key==='Meta'){
    kbDrag.isCtrl=false;
    document.body.classList.remove('kb-copy-mode');
    updateCopyBadgeFromLastEvent(false);
  }
});

let _lastMouseX=0,_lastMouseY=0;
document.addEventListener('mousemove',e=>{ _lastMouseX=e.clientX; _lastMouseY=e.clientY; });

function updateCopyBadge(isCtrl, e){
  const badge = document.getElementById('kb-copy-badge');
  if(!badge) return;
  const x = e ? e.clientX : _lastMouseX;
  const y = e ? e.clientY : _lastMouseY;
  badge.style.display = isCtrl ? 'block' : 'none';
  badge.style.left = (x+14)+'px';
  badge.style.top  = (y-10)+'px';
}
function updateCopyBadgeFromLastEvent(isCtrl){
  const badge = document.getElementById('kb-copy-badge');
  if(!badge) return;
  badge.style.display = isCtrl ? 'block' : 'none';
  badge.style.left = (_lastMouseX+14)+'px';
  badge.style.top  = (_lastMouseY-10)+'px';
}
function hideCopyBadge(){
  const badge = document.getElementById('kb-copy-badge');
  if(badge) badge.style.display='none';
  document.body.classList.remove('kb-copy-mode');
}

window.kbSelectTask=function(id){
  state.activeTaskId=id;
  // switch back to list mode and open detail
  setAppMode('list');
  // highlight and open detail
  document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('active'));
  const el=document.querySelector(`.task-item[data-id="${id}"]`);
  if(el) el.classList.add('active');
  if(!state.detailOpen) toggleDetail();
  renderDetail();
};

window.kbToggleDone=function(id){
  toggleDone(id);
  // re-render kanban in place
  renderKanban();
};

// ── DETAIL PANEL ─────────────────────────────────────────────────
let activePopup=null;

function renderDetail(){
  const area=document.getElementById('detail-inner');
  if(!state.activeTaskId){area.innerHTML=`<div class="detail-empty"><div class="big">◈</div><p>SELECT A TASK<br/>TO VIEW DETAILS</p></div>`;return;}
  const t=getTask(state.activeTaskId);
  if(!t){area.innerHTML=`<div class="detail-empty"><div class="big">?</div><p>Task not found</p></div>`;return;}
  const parent=t.parentId?getTask(t.parentId):null;
  const children=getChildren(t.id);
  const comments=(t.comments||[]).slice().sort((a,b)=>b.createdAt-a.createdAt);
  const isArchived=!!t.archived,isTrashed=!!t.trashed,isReadOnly=isTrashed;

  // Categories — all tags always visible, click to toggle
  migrateTags();
  let catsHtml='';
  state.categories.forEach(cat=>{
    const assigned = t.tags[cat]||[];
    const allVals  = getAllTagValues(cat);
    let tagsHtml   = '';

    // Show ALL available tags — assigned (bold + ×) and unassigned (faded, click to assign)
    allVals.forEach(val=>{
      const c=getTagColor(cat,val);
      const isOn=assigned.includes(val);
      if(isOn){
        tagsHtml+=`<span class="d-tag" style="border-left-color:${c.accent};" onclick="${!isReadOnly?`removeTagFromTask('${esc(t.id)}','${esc(cat)}','${esc(val)}')`:''}" title="Click to remove">${esc(val)}${!isReadOnly?`<span class="rm">×</span>`:''}</span>`;
      } else if(!isReadOnly){
        tagsHtml+=`<span class="d-tag-off" style="border-left-color:${c.accent};" onclick="addTagToTask('${esc(t.id)}','${esc(cat)}','${esc(val)}')" title="Click to assign">${esc(val)}</span>`;
      }
    });

    // Inline new-tag input at end of row
    if(!isReadOnly){
      tagsHtml+=`<input class="cat-new-inp" id="newt-${esc(cat)}-${esc(t.id)}" placeholder="+ new…"
        onkeydown="if(event.key==='Enter')catNewTag('${esc(t.id)}','${esc(cat)}',this)"
        onclick="event.stopPropagation()"/>`;
    }

    catsHtml+=`<div class="cat-row"><div class="cat-label">${esc(cat)}</div><div class="cat-tags">${tagsHtml}</div></div>`;

  // Subtasks — exclude trashed, sort archived/done to bottom
  const activeChildren   = children.filter(c=>!c.trashed && !c.done && !c.archived);
  const doneChildren     = children.filter(c=>!c.trashed && (c.done || c.archived));
  const visibleChildren  = [...activeChildren, ...doneChildren];
  const doneCount        = doneChildren.length;

  let subHtml='';
  if(visibleChildren.length){
    subHtml+=`<div style="font-size:10px;color:var(--muted);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;">${doneCount}/${visibleChildren.length} COMPLETE</div>`;

      const isDone = c.done || c.archived;
      subHtml+=`<div class="d-sub-row${state.activeTaskId===c.id?' active-sub':''}${isDone?' d-sub-done':''}"

        ondragstart="subDragStart(event,'${c.id}')"
        ondragover="subDragOver(event)"
        ondragleave="subDragLeave(event)"
        ondrop="subDrop(event,'${t.id}','${c.id}')">
        <span class="d-sub-drag">⠿</span>

        </div>
      </div>`;
    });
  }
  if(!isReadOnly){
    subHtml+=`<div class="sub-add-row">

  // Comments — newest first

    commentsHtml+=`<div class="comment-card" id="comment-${c.id}">

        </div>
        ${!isReadOnly?`<div class="comment-actions">
          <button class="comment-act-btn" onclick="startEditComment('${t.id}','${c.id}')">Edit</button>

        </div>`:''}
      </div>
      <div class="comment-body" id="cbody-${c.id}">${esc(c.text)}</div>
      <textarea class="comment-edit-area" id="cedit-${c.id}" style="display:none;">${esc(c.text)}</textarea>
      <div class="comment-edit-actions" id="cedit-actions-${c.id}" style="display:none;">
        <button class="btn accent" style="font-size:10px;padding:4px 10px;" onclick="saveEditComment('${t.id}','${c.id}')">Save</button>
        <button class="btn" style="font-size:10px;padding:4px 10px;" onclick="cancelEditComment('${c.id}')">Cancel</button>
      </div>
    </div>`;
  });

  const statusBadge=isArchived?`<span class="task-status-badge badge-archived">ARCHIVED</span>`:isTrashed?`<span class="task-status-badge badge-trashed">TRASHED</span>`:'';

  // Build full breadcrumb
  const ancestors = getAncestors(t.id);
  let breadcrumbHtml = '';
  if(ancestors.length > 0){
    breadcrumbHtml = `<div class="task-breadcrumb">
      <span class="bc-seg" onclick="selectTask('')" title="Root">⌂ Root</span>`;
    ancestors.forEach(a=>{
      breadcrumbHtml += `<span class="bc-sep">›</span>
        <span class="bc-seg" onclick="selectTask('${a.id}')" title="${esc(a.text)}">${esc(a.text)}</span>`;
    });
    breadcrumbHtml += `<span class="bc-sep">›</span>
      <span class="bc-current" title="${esc(t.text)}">${esc(t.text)}</span>
    </div>`;
  }

  area.innerHTML=`
    <div style="position:relative;padding-right:30px;margin-bottom:8px;">
      <button class="d-close" onclick="closeDetail()">✕</button>
      ${breadcrumbHtml}
      ${statusBadge?`<div style="margin-bottom:8px;">${statusBadge}</div>`:''}
      <div class="d-task-name" id="d-task-name-${t.id}"
        onclick="${!isReadOnly?`startDetailEditTitle('${t.id}')`:''}"
        style="${isReadOnly?'cursor:default;':''}"
        title="${!isReadOnly?'Click to edit title':''}"
      >${esc(t.text)}</div>
      <div style="font-size:9px;color:var(--dim);margin-top:5px;font-family:'IBM Plex Mono',monospace;line-height:1.8;">
        Created ${fullDate(t.createdAt)}
        ${t.completedAt?`<br/>✓ Completed ${fullDate(t.completedAt)}`:''}
        ${t.trashedAt?`<br/>🗑 Trashed ${fullDate(t.trashedAt)}`:''}
      </div>
    </div>

    <div style="display:flex;gap:6px;flex-wrap:wrap;padding:12px 0;margin-bottom:18px;border-bottom:1px solid var(--border);border-top:1px solid var(--border);">
      ${!isReadOnly&&!isArchived&&!t.done?`<button class="btn accent" style="font-size:10px;padding:5px 10px;" onclick="archiveTask('${t.id}')">✓ Mark Complete</button>`:''}
      ${!isReadOnly&&!isArchived&&t.done?`<button class="btn accent" style="font-size:10px;padding:5px 10px;" onclick="archiveTask('${t.id}')">↑ Archive</button><button class="btn" style="font-size:10px;padding:5px 10px;" onclick="toggleDone('${t.id}')">↩ Unmark Done</button>`:''}
      ${isArchived&&!isTrashed?`<button class="btn" style="font-size:10px;padding:5px 10px;" onclick="unarchiveTask('${t.id}')">↩ Restore Active</button>`:''}
      ${!isTrashed?`<button class="btn danger" style="font-size:10px;padding:5px 10px;" onclick="trashTask('${t.id}')">🗑 Move to Trash</button>`:''}
      ${isTrashed?`<button class="btn restore" style="font-size:10px;padding:5px 10px;" onclick="restoreTask('${t.id}')">↩ Restore from Trash</button>`:''}
      ${t.parentId?`<button class="btn" style="font-size:10px;padding:5px 10px;" onclick="promoteToRoot('${t.id}')">↑ Promote to Root</button>`:''}
    </div>

    <div class="d-section">
      <div class="d-section-hd">Categories &amp; Tags ${!isReadOnly?`<button onclick="showAddCat()">+ New Category</button>`:''}</div>
      <div id="d-cats">${catsHtml}</div>
      <div id="add-cat-area"></div>
    </div>

    <div class="d-section">
      <div class="d-section-hd">Description <span class="hd-meta">${!isReadOnly?'click to edit':''}</span></div>
      ${isReadOnly
        ?`<div class="rte-display${t.description?'':' empty'}">${t.description||'No description.'}</div>`
        :`<div id="desc-display-${t.id}" class="rte-display${t.description?'':' empty'}" onclick="openRTE('${t.id}')" title="Click to edit description">${t.description||'Click to add a description…'}</div>
          <div id="desc-rte-${t.id}" style="display:none;">
            <div class="rte-wrap">
              <div class="rte-toolbar">
                <button class="rte-btn" title="Bold" onclick="rteCmd('bold')"><b>B</b></button>
                <button class="rte-btn" title="Italic" onclick="rteCmd('italic')"><i>I</i></button>
                <button class="rte-btn" title="Underline" onclick="rteCmd('underline')"><u>U</u></button>
                <div class="rte-sep"></div>
                <button class="rte-btn" title="Bullet list" onclick="rteCmd('insertUnorderedList')">≡</button>
                <button class="rte-btn" title="Numbered list" onclick="rteCmd('insertOrderedList')">1.</button>
                <button class="rte-btn" title="Blockquote" onclick="rteCmd('formatBlock','blockquote')">"</button>

                <button class="rte-btn" title="Clear formatting" onclick="rteCmd('removeFormat')">✕</button>
                <div style="flex:1;"></div>
                <button class="rte-btn" style="font-size:9px;padding:3px 8px;" onclick="closeRTE('${t.id}')">Done ↵</button>
              </div>
              <div class="rte-editor" id="rte-editor-${t.id}" contenteditable="true" data-placeholder="Write a description…" onInput="this.removeAttribute('data-empty')"></div>
            </div>
          </div>`
      }
    </div>

    <div class="d-section">
      <div class="d-section-hd">Subtasks <span class="hd-meta">${doneCount}/${visibleChildren.length} complete</span></div>
      ${subHtml}
    </div>

    <div class="d-section">
      <div class="d-section-hd">Comments <span class="hd-meta">${comments.length || ''}</span></div>
      ${!isReadOnly?`<div class="comment-inp-wrap">
        <textarea class="comment-inp" id="comment-inp-${t.id}" placeholder="Add a comment… (Ctrl+Enter to post)" rows="2"></textarea>
        <div class="comment-submit-row">
          <button class="btn" style="font-size:10px;padding:5px 12px;" onmousedown="event.preventDefault();clearCommentInp('${t.id}')">Clear</button>
          <button class="btn accent" style="font-size:10px;padding:5px 12px;" onmousedown="event.preventDefault();addComment('${t.id}')">Post Comment</button>
        </div>
      </div>`:''}
      <div class="comment-list">${commentsHtml||`<div style="font-size:11px;color:var(--dim);padding:6px 0;">No comments yet.</div>`}</div>
    </div>`;

  // Restore RTE content
  if(!isReadOnly){
    const editor=document.getElementById(`rte-editor-${t.id}`);
    if(editor){
      editor.innerHTML=t.description||'';
      if(!t.description)editor.setAttribute('data-empty','1');
      editor.addEventListener('keydown',e=>{if(e.key==='Escape')closeRTE(t.id);});
    }
    const ci=document.getElementById(`comment-inp-${t.id}`);
    if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();addComment(t.id);}});
  }
}

// ── TITLE EDIT ───────────────────────────────────────────────────
window.startDetailEditTitle=function(id){
  const t=getTask(id);if(!t||t.trashed)return;
  const el=document.getElementById('d-task-name-'+id);if(!el)return;
  const inp=document.createElement('input');inp.className='d-task-name-edit';inp.value=t.text;
  inp.onblur=()=>updateTask(id,{text:inp.value.trim()||t.text});
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=t.text;inp.blur();}};
  el.replaceWith(inp);inp.focus();inp.select();
};

// ── SUBTASK TITLE EDIT IN DETAIL ─────────────────────────────────
window.startEditSubTitle=function(id){
  const t=getTask(id);if(!t||t.trashed)return;
  const el=document.getElementById('dsub-'+id);if(!el)return;
  const inp=document.createElement('input');inp.className='d-sub-title-edit';inp.value=t.text;
  inp.style.flex='1';inp.style.width='100%';
  inp.onclick=e=>e.stopPropagation();
  inp.onblur=()=>updateTask(id,{text:inp.value.trim()||t.text});
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=t.text;inp.blur();}};
  el.replaceWith(inp);inp.focus();inp.select();
};

// ── RICH TEXT EDITOR ─────────────────────────────────────────────
window.openRTE=function(id){
  const disp=document.getElementById('desc-display-'+id),rte=document.getElementById('desc-rte-'+id);
  if(!disp||!rte)return;
  disp.style.display='none';rte.style.display='block';
  const editor=document.getElementById('rte-editor-'+id);
  if(editor){editor.focus();const r=document.createRange(),s=window.getSelection();r.selectNodeContents(editor);r.collapse(false);s.removeAllRanges();s.addRange(r);}
};
window.closeRTE=function(id){
  saveRTE(id);
  const disp=document.getElementById('desc-display-'+id),rte=document.getElementById('desc-rte-'+id);if(!disp||!rte)return;
  const editor=document.getElementById('rte-editor-'+id);
  const content=editor?editor.innerHTML:'';
  const isEmpty=!content||content==='<br>'||content.trim()==='';
  disp.className='rte-display'+(isEmpty?' empty':'');
  disp.innerHTML=isEmpty?'Click to add a description…':content;
  rte.style.display='none';disp.style.display='block';
};
window.saveRTE=function(id){
  const editor=document.getElementById('rte-editor-'+id);if(!editor)return;
  const content=editor.innerHTML;const isEmpty=!content||content==='<br>'||content.trim()==='';
  const t=getTask(id);if(!t)return;
  const newDesc=isEmpty?'':content;if(newDesc!==t.description)updateTask(id,{description:newDesc});
};
window.rteCmd=function(cmd,val){document.execCommand(cmd,false,val||null);document.querySelectorAll('.rte-editor').forEach(e=>e.focus());};

// ── ADD SUBTASK DIRECTLY ─────────────────────────────────────────
window.addSubtaskDirect=function(parentId){
  const inp=document.getElementById('sub-add-'+parentId);if(!inp)return;
  const text=inp.value.trim();if(!text)return;

let subDragId = null;

window.subDragStart = function(e, id){
  subDragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(()=>{ const el=document.querySelector(`.d-sub-row[data-sub-id="${id}"]`); if(el) el.classList.add('sub-dragging'); }, 0);
};

window.subDragOver = function(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.d-sub-row').forEach(r=>r.classList.remove('sub-drag-over'));
  const row = e.currentTarget;
  if(row.dataset.subId !== subDragId) row.classList.add('sub-drag-over');
};

window.subDragLeave = function(e){
  e.currentTarget.classList.remove('sub-drag-over');
};

window.subDrop = function(e, parentId, targetId){
  e.preventDefault();
  document.querySelectorAll('.d-sub-row').forEach(r=>{
    r.classList.remove('sub-drag-over');
    r.classList.remove('sub-dragging');
  });
  if(!subDragId || subDragId === targetId) { subDragId=null; return; }

  // Get sibling list of the parent (only non-trashed)
  const siblings = getChildren(parentId).filter(c=>!c.trashed);
  const fromIdx  = siblings.findIndex(c=>c.id === subDragId);
  const toIdx    = siblings.findIndex(c=>c.id === targetId);
  if(fromIdx === -1 || toIdx === -1) { subDragId=null; return; }

  // Reorder
  const reordered = [...siblings];
  const [moved] = reordered.splice(fromIdx, 1);
  reordered.splice(toIdx, 0, moved);
  reordered.forEach((c,i) => { c.order = i; });

  subDragId = null;
  save(); render(); renderDetail();
};

// ── MINI CALENDAR ─────────────────────────────────────────────────
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-based

function getISOWeek(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function renderCal(){
  const el = document.getElementById('mini-cal');
  if(!el) return;
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW = ['M','T','W','T','F','S','S'];

  // first day of month, pad to Monday-start
  const first = new Date(calYear, calMonth, 1);
  const last  = new Date(calYear, calMonth + 1, 0);
  // Monday=0 offset
  const startOffset = (first.getDay() + 6) % 7;

  // collect all days to display (fill grid from Monday)
  const days = [];
  for(let i = startOffset - 1; i >= 0; i--){
    const d = new Date(calYear, calMonth, -i);
    days.push({date:d, cur:false});
  }
  for(let i = 1; i <= last.getDate(); i++){
    days.push({date: new Date(calYear, calMonth, i), cur:true});
  }
  // fill to complete last week
  const rem = days.length % 7;
  if(rem > 0){
    for(let i = 1; i <= 7 - rem; i++){
      days.push({date: new Date(calYear, calMonth + 1, i), cur:false});
    }
  }

  // build rows (weeks)
  const weeks = [];
  for(let i = 0; i < days.length; i += 7) weeks.push(days.slice(i, i+7));

  let html = `
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <span class="cal-month">${MONTHS[calMonth]} ${calYear}</span>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow"></div>
      ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}`;

  weeks.forEach(week => {
    const wkNum = getISOWeek(week[0].date);
    const hasToday = week.some(d => `${d.date.getFullYear()}-${d.date.getMonth()}-${d.date.getDate()}` === todayStr);
    html += `<div class="cal-wk-label${hasToday?' today-row':''}">W${wkNum}</div>`;
    week.forEach(({date, cur}) => {
      const isToday = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}` === todayStr;
      html += `<div class="cal-day${!cur?' other-month':''}${isToday?' today':''}">${date.getDate()}</div>`;
    });
  });

  html += `</div>`;
  el.innerHTML = html;
}

window.calNav = function(dir){
  calMonth += dir;
  if(calMonth > 11){ calMonth = 0; calYear++; }
  if(calMonth < 0){ calMonth = 11; calYear--; }
  renderCal();
};

(function(){
  const handle=document.getElementById('left-resize');
  const panel=document.getElementById('left');
  const LS_KEY='tf_left_width';
  const MIN_W=200,MAX_W=420,MIN_MAIN=320;
  let dragging=false,startX=0,startW=0;
  function detailW(){const d=document.getElementById('detail');return d&&!d.classList.contains('hidden')?d.offsetWidth:0;}
  // Restore saved width
  const saved=parseInt(localStorage.getItem(LS_KEY),10);
  if(saved&&saved>=MIN_W){
    const w=Math.min(saved,Math.min(MAX_W,window.innerWidth-detailW()-MIN_MAIN));
    panel.style.width=w+'px';panel.style.minWidth=w+'px';
  }
  handle.addEventListener('mousedown',e=>{
    if(panel.classList.contains('collapsed'))return;
    dragging=true;startX=e.clientX;startW=panel.offsetWidth;
    handle.classList.add('dragging');panel.classList.add('resizing');
    document.body.style.cursor='col-resize';document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const maxW=Math.min(MAX_W,window.innerWidth-detailW()-MIN_MAIN);
    const newW=Math.min(maxW,Math.max(MIN_W,startW+(e.clientX-startX)));
    panel.style.width=newW+'px';panel.style.minWidth=newW+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    handle.classList.remove('dragging');panel.classList.remove('resizing');
    document.body.style.cursor='';document.body.style.userSelect='';
    localStorage.setItem(LS_KEY,panel.offsetWidth);
  });
})();

  const savedW=parseInt(localStorage.getItem('tf_detail_width'),10);
  if(savedW&&savedW>=MIN_W&&!isBottom()){
    const maxW=Math.min(MAX_W,window.innerWidth-leftW()-MIN_MAIN);
    panel.style.width=Math.min(savedW,maxW)+'px';
  }
  handle.addEventListener('mousedown',e=>{
    dragging=true;startX=e.clientX;startY=e.clientY;
    startSize=isBottom()?panel.offsetHeight:panel.offsetWidth;
    handle.classList.add('dragging');panel.classList.add('resizing');
    document.body.style.cursor=isBottom()?'row-resize':'col-resize';
    document.body.style.userSelect='none';e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    if(isBottom()){
      const delta=startY-e.clientY; // drag up = taller
      const maxH=Math.min(MAX_H,window.innerHeight*0.7);
      const newH=Math.min(maxH,Math.max(MIN_H,startSize+delta));
      document.documentElement.style.setProperty('--tf-bottom-h',newH+'px');
    } else {
      const delta=startX-e.clientX; // drag left = wider
      const maxW=Math.min(MAX_W,window.innerWidth-leftW()-MIN_MAIN);
      panel.style.width=Math.min(maxW,Math.max(MIN_W,startSize+delta))+'px';
    }
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    handle.classList.remove('dragging');panel.classList.remove('resizing');
    document.body.style.cursor='';document.body.style.userSelect='';
    if(isBottom()){
      const cur=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--tf-bottom-h'))||bottomPaneH;
      bottomPaneH=Math.round(cur);localStorage.setItem('tf_bottom_h',bottomPaneH);
    } else {
      localStorage.setItem('tf_detail_width',panel.offsetWidth);
    }
  });
})();

window.startRenameCat = function(cat, ci){
  const nameEl = document.getElementById('catname-'+ci);
  if(!nameEl) return;
  const inp = document.createElement('input');
  inp.className = 'cat-rename-inp'; inp.value = cat;
  inp.onclick = e=>e.stopPropagation();
  inp.onblur = ()=>{ submitRenameCat(cat, inp.value.trim()||cat); };
  inp.onkeydown = e=>{ if(e.key==='Enter') inp.blur(); if(e.key==='Escape'){inp.value=cat;inp.blur();} };
  nameEl.replaceWith(inp); inp.focus(); inp.select();
};

function submitRenameCat(oldName, newName){
  if(!newName||newName===oldName){ renderSettings(); return; }
  if(state.categories.includes(newName)){ alert('Category "'+newName+'" already exists.'); renderSettings(); return; }
  const idx = state.categories.indexOf(oldName);
  if(idx===-1){ renderSettings(); return; }
  state.categories[idx] = newName;
  state.tasks.forEach(t=>{
    if(t.tags[oldName]!==undefined){ t.tags[newName]=t.tags[oldName]; delete t.tags[oldName]; }
  });
  // migrate definedTags
  if(state.definedTags[oldName]!==undefined){
    state.definedTags[newName]=state.definedTags[oldName];
    delete state.definedTags[oldName];
  }
  // migrate tagColors keys
  const newTagColors = {};
  Object.entries(state.tagColors).forEach(([k,v])=>{
    if(k.startsWith(oldName+'::')){ newTagColors[newName+'::'+k.slice(oldName.length+2)]=v; }
    else newTagColors[k]=v;
  });
  state.tagColors = newTagColors;
  save(); render(); renderSettings();
}

window.deleteCategory = function(cat){
  if(!confirm(`Delete category "${cat}"?\n\nAll tags in this category will be removed from tasks.`)) return;
  state.categories = state.categories.filter(c=>c!==cat);
  state.tasks.forEach(t=>{ delete t.tags[cat]; });
  delete state.definedTags[cat];
  Object.keys(state.tagColors).forEach(k=>{ if(k.startsWith(cat+'::')) delete state.tagColors[k]; });
  delete catOpen[cat];
  save(); render(); renderSettings();
};

window.addTagValue = function(cat, ci){
  const inp = document.getElementById('taginp-'+ci); if(!inp) return;
  const val = inp.value.trim(); if(!val) return;
  // add to definedTags even if no task uses it yet
  if(!state.definedTags[cat]) state.definedTags[cat]=[];
  if(!state.definedTags[cat].includes(val)){
    state.definedTags[cat].push(val);
    getTagColor(cat, val); // register colour
  }
  inp.value='';
  catOpen[cat] = true;
  save(); render(); renderSettings();
  // refocus input after re-render
  setTimeout(()=>{ const i=document.getElementById('taginp-'+ci); if(i) i.focus(); },50);
};

window.startRenameTag = function(cat, oldVal){
  const chipId = 'tagchip-'+cat+'-'+oldVal;
  const chip = document.getElementById(chipId); if(!chip) return;
  const inp = document.createElement('input');
  inp.style.cssText='font-size:10px;background:transparent;border:none;border-bottom:1px solid currentColor;color:inherit;outline:none;width:80px;font-family:"IBM Plex Mono",monospace;';
  inp.value = oldVal;
  inp.onblur = ()=>submitRenameTag(cat, oldVal, inp.value.trim()||oldVal);
  inp.onkeydown = e=>{ if(e.key==='Enter')inp.blur(); if(e.key==='Escape'){inp.value=oldVal;inp.blur();} };
  // replace just the text span
  const textSpan = chip.querySelector('span');
  if(textSpan){ textSpan.replaceWith(inp); inp.focus(); inp.select(); }
};

function submitRenameTag(cat, oldVal, newVal){
  if(!newVal||newVal===oldVal){ renderSettings(); return; }
  state.tasks.forEach(t=>{
    if((t.tags[cat]||[]).includes(oldVal)){
      t.tags[cat] = t.tags[cat].map(v=>v===oldVal?newVal:v);
    }
  });
  // update definedTags
  if(state.definedTags[cat]){
    state.definedTags[cat]=state.definedTags[cat].map(v=>v===oldVal?newVal:v);
  }
  const oldKey = tagKey(cat,oldVal), newKey = tagKey(cat,newVal);
  if(state.tagColors[oldKey]!==undefined){ state.tagColors[newKey]=state.tagColors[oldKey]; delete state.tagColors[oldKey]; }
  if(state.filters[cat]&&state.filters[cat].has(oldVal)){ state.filters[cat].delete(oldVal); state.filters[cat].add(newVal); }
  save(); render(); renderSettings();
}

window.deleteTag = function(cat, val){
  state.tasks.forEach(t=>{ if(t.tags[cat]) t.tags[cat]=t.tags[cat].filter(v=>v!==val); });
  if(state.definedTags[cat]) state.definedTags[cat]=state.definedTags[cat].filter(v=>v!==val);
  delete state.tagColors[tagKey(cat,val)];
  if(state.filters[cat]) state.filters[cat].delete(val);
  save(); render(); renderSettings();
};

window.submitNewCategory = function(){
  const inp = document.getElementById('newcat-inp'); if(!inp) return;
  const name = inp.value.trim(); if(!name) return;
  if(state.categories.includes(name)){ inp.style.borderColor='var(--accent2)'; setTimeout(()=>inp.style.borderColor='',1000); return; }
  state.categories.push(name); inp.value='';
  catOpen[name] = true; // auto-expand new category
  save(); render(); renderSettings();
};

// ── STATUS FILTER ────────────────────────────────────────────────
let statusFilter=new Set();
function getTaskStatus(t){
  if(t.trashed)return'trashed';
  if(t.archived)return'archived';
  if(t.done)return'done';
  return'active';
}
function isStatusFilterActive(){return statusFilter.size>0;}
window.toggleStatusFilter=function(s){
  if(statusFilter.has(s))statusFilter.delete(s);else statusFilter.add(s);
  const clr=document.getElementById('status-filter-clear');
  if(clr)clr.style.display=statusFilter.size>0?'':'none';
  render();
};
window.clearStatusFilter=function(){
  statusFilter.clear();
  const clr=document.getElementById('status-filter-clear');
  if(clr)clr.style.display='none';
  render();
};

// ── SEARCH ───────────────────────────────────────────────────────
let searchQuery='';
function stripHtml(h){const d=document.createElement('div');d.innerHTML=h||'';return d.textContent||'';}
function isSearchActive(){return searchQuery.trim().length>0;}
function taskMatchesSearch(t){
  if(!isSearchActive())return true;
  const q=searchQuery.toLowerCase();
  if((t.text||'').toLowerCase().includes(q))return true;
  if(stripHtml(t.description).toLowerCase().includes(q))return true;
  return false;
}
function taskOrDescendantMatchesSearch(t){
  return taskMatchesSearch(t)||getAllDescendants(t.id).some(d=>taskMatchesSearch(d));
}
function updateSearchCount(){
  const el=document.getElementById('search-count');
  if(!el)return;
  if(!isSearchActive()){el.textContent='';return;}
  const area=document.getElementById('task-area');
  const count=area?area.querySelectorAll('.task-item:not(.deleted-card)').length:0;
  el.textContent=count+' result'+(count!==1?'s':'');
}
window.setSearch=function(v){searchQuery=v;render();updateSearchCount();};
window.toggleSearch=function(){
  const bar=document.getElementById('search-bar');
  const btn=document.getElementById('search-toggle');
  const inp=document.getElementById('search-inp');
  const isOpen=bar.classList.contains('show');
  if(isOpen){clearSearch();}
  else{bar.classList.add('show');btn.classList.add('search-active');if(inp)setTimeout(()=>inp.focus(),50);}
};
window.clearSearch=function(){
  searchQuery='';
  const inp=document.getElementById('search-inp');if(inp)inp.value='';
  const bar=document.getElementById('search-bar');if(bar)bar.classList.remove('show');
  const btn=document.getElementById('search-toggle');if(btn)btn.classList.remove('search-active');
  const el=document.getElementById('search-count');if(el)el.textContent='';
  render();
};
