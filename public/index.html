<!DOCTYPE html>
<!-- TaskFlow v1.44 | deploy -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>taskflow. v2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c0f;--surface:#111116;--surface2:#16161d;
  --border:#1f1f2e;--border2:#2a2a3a;--text:#eeeef0;--muted:#8888a0;--dim:#44445a;
  --accent:#e8ff47;--accent-text:#000;--accent2:#ff6b6b;
  --hover:#1c1c26;--drag-over:#1a2a1a;--indent-line:#2a2a3a;--shadow:rgba(0,0,0,.4);
}
body.light{
  --bg:#f4f3ee;--surface:#ffffff;--surface2:#f9f8f4;
  --border:#dddbd2;--border2:#c8c6bc;--text:#1a1a1a;--muted:#555550;--dim:#9a9893;
  --accent:#00796B;--accent-text:#fff;--accent2:#c0392b;
  --hover:#edecea;--drag-over:#e0f5f2;--indent-line:#c8c6bc;--shadow:rgba(0,0,0,.1);
}
body.light .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
body.light .btn.accent:hover{background:#005a4f;}
body.light .btn{color:var(--muted);border-color:var(--border2);background:#fff;}
body.light .btn:hover{color:var(--text);background:var(--hover);}
body.light .chk{border-color:var(--border2);background:#fff;}
body.light .chk:hover{border-color:var(--accent);}
body.light .chk.on{background:var(--accent);border-color:var(--accent);color:#fff;}
body.light .task-item{background:#fff;border-color:var(--border);box-shadow:0 1px 3px rgba(15,17,30,.06);}
body.light .task-item:hover{background:var(--surface2);border-color:var(--border2);}
body.light .task-item.active{border-color:var(--accent)!important;box-shadow:0 0 0 2px rgba(0,121,107,.22),4px 0 0 0 var(--accent)!important;background:#f0faf8!important;}
body.light .filter-tag{background:#f0efea;border-color:#d4d2ca;color:#2a2a28;}
body.light .filter-tag:hover{background:#e8e6e0;}
body.light .filter-tag.active{background:#e2e0d8;font-weight:600;}
body.light .add-task-inp{background:#fff;border-color:var(--border2);color:var(--text);}
body.light .add-task-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,121,107,.12);}
body.light .add-task-inp::placeholder{color:var(--dim);}
body.light .stat-n{color:var(--accent);}
body.light .stat-box{background:#fff;border-color:var(--border);}
body.light #topbar{background:#fff;border-color:var(--border);box-shadow:0 1px 4px rgba(15,17,30,.08);}
body.light #left{background:var(--surface2);border-color:var(--border);}
body.light #detail{background:var(--surface2);border-color:var(--border);}
body.light .filter-active-bar{background:rgba(0,121,107,.06);border-color:rgba(0,121,107,.22);color:var(--accent);}
body.light .active-filter-chip{background:rgba(0,121,107,.1);border-color:rgba(0,121,107,.25);color:var(--accent);}
body.light .comment-card{background:#fff;border-color:var(--border);}
body.light .rte-toolbar{background:var(--surface2);}
body.light .tag-popup{background:#fff;box-shadow:0 8px 32px rgba(15,17,30,.16);}
body.light .view-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
body.light #detail.drop-target{background:rgba(0,121,107,.05);border-left:2px solid var(--accent)!important;}
body.light .archive-badge-count.has-items{background:rgba(0,121,107,.15);color:var(--accent);}

body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

#app{display:flex;height:100vh;overflow:hidden;}

/* LEFT */
#left{width:260px;min-width:260px;display:flex;flex-direction:column;border-right:1px solid var(--border2);background:var(--surface);transition:width .3s,min-width .3s;overflow:hidden;}
#left.collapsed{width:0;min-width:0;}
#left.resizing{transition:none;}
/* drag-to-resize handle for left panel */
#left-resize{
  width:5px;min-width:5px;cursor:col-resize;
  position:relative;z-index:10;flex-shrink:0;
  background:transparent;transition:background .15s;
}
#left.collapsed + #left-resize{display:none;}
#left-resize:hover,#left-resize.dragging{background:var(--accent);}
#left-resize::after{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:1px;height:40px;background:var(--border2);border-radius:1px;
  transition:background .15s;
}
#left-resize:hover::after,#left-resize.dragging::after{background:var(--accent);}
.left-top{padding:18px 16px 12px;border-bottom:1px solid var(--border);}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.logo span{color:var(--accent);}
.tagline{font-size:9px;color:var(--muted);letter-spacing:1px;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:6px;}
.app-version{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--dim);letter-spacing:.5px;margin-top:2px;}
.filter-panel{flex:1;overflow-y:auto;padding:12px;}
.filter-section-title{font-size:12px;font-weight:600;letter-spacing:.2px;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;font-family:'IBM Plex Sans',sans-serif;}
.filter-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;font-family:'IBM Plex Sans',sans-serif;transition:color .15s;}
.filter-clear:hover{color:var(--accent2);}
.cat-group{margin-bottom:12px;border-radius:6px;transition:background .15s;}
.cat-group.cat-drag-over{background:var(--hover);outline:1.5px dashed var(--accent);outline-offset:2px;}
.cat-group-header{display:flex;align-items:center;gap:5px;margin-bottom:6px;cursor:default;}
.cat-group-drag{font-size:11px;color:var(--dim);cursor:grab;opacity:0;padding:1px 3px;transition:opacity .15s;user-select:none;line-height:1;}
.cat-group:hover .cat-group-drag{opacity:.5;}
.cat-group-drag:hover{opacity:1!important;}
.cat-group-name{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.2px;font-family:'IBM Plex Sans',sans-serif;flex:1;}
.cat-group-header{cursor:pointer;}
.cat-group-header:hover .cat-group-name{color:var(--text);}
.cat-collapse-arrow{font-size:9px;color:var(--dim);transition:transform .2s;display:inline-block;margin-left:2px;line-height:1;}
.cat-group.cat-collapsed .cat-collapse-arrow{transform:rotate(-90deg);}
.cat-group-tags.cat-collapsed{display:none;}
.filter-tag-wrap{display:inline-flex;align-items:center;margin:1px 2px;position:relative;}
.filter-tag-drag{font-size:10px;color:var(--dim);cursor:grab;opacity:0;padding:1px 2px;line-height:1;user-select:none;transition:opacity .15s;}
.cat-group:hover .filter-tag-drag{opacity:.4;}
.filter-tag-drag:hover{opacity:1!important;}
.filter-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid #d4d2ca;border-left-width:3px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-weight:500;margin:1px 2px;transition:all .15s;background:#f0efea;color:#2a2a28;}
.filter-tag:hover{background:#e8e6e0;border-color:#c0beb6;border-left-color:inherit;}
.filter-tag.active{background:#e8e6e0;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.filter-tag .dot{display:none;}
.left-bottom{padding:12px 16px;border-top:1px solid var(--border);}
.stats-row{display:flex;gap:6px;}
.stat-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 6px;text-align:center;}
.stat-n{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--accent);}
.stat-l{font-size:9px;color:var(--dim);letter-spacing:1px;margin-top:1px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;display:inline-block;transition:all .3s;}
.sync-dot.live{background:#06D6A0;box-shadow:0 0 6px #06D6A0;}
.sync-dot.error{background:#EF476F;box-shadow:0 0 6px #EF476F;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.topbar-toggle{background:var(--surface2);border:1px solid var(--border2);color:#00897B;border-radius:6px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.topbar-toggle:hover{border-color:#00897B;color:#00695C;background:rgba(0,137,123,.1);}
.add-task-wrap{flex:1;display:flex;gap:7px;align-items:center;}
.add-task-inp{flex:1;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;border-radius:7px;padding:8px 14px;outline:none;transition:all .2s;}
.add-task-inp:focus{border-color:var(--accent);}
.add-task-inp::placeholder{color:var(--dim);}
.filter-active-bar{display:none;padding:6px 14px;font-size:11px;border-bottom:1px solid;flex-shrink:0;flex-wrap:wrap;gap:5px;align-items:center;}
.filter-active-bar.show{display:flex;}
.active-filter-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid;font-family:'IBM Plex Mono',monospace;}
.active-filter-chip button{background:none;border:none;cursor:pointer;font-size:11px;line-height:1;padding:0;}

/* VIEW TABS */
.view-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.view-tab{flex:1;padding:11px 10px;font-size:12px;font-weight:500;letter-spacing:.3px;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;}
.view-tab:hover{color:var(--text);}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.archive-badge-count{background:var(--hover);color:var(--muted);padding:1px 6px;border-radius:99px;font-size:10px;margin-left:4px;}
.archive-badge-count.has-items{background:rgba(232,255,71,.1);color:var(--accent);}

/* TASK AREA */
#task-area{flex:1;overflow-y:auto;padding:4px 0 20px;}
.task-row{position:relative;}

.task-item{
  display:flex;align-items:stretch;
  padding:0;margin:0;background:transparent;
  border:none;border-left:3px solid transparent;
  cursor:pointer;transition:background .1s,border-color .1s;
}
.task-item:hover{background:var(--hover);}
.task-item.active{background:var(--hover);border-color:var(--accent)!important;border-left:3px solid var(--accent)!important;box-shadow:0 0 0 1px rgba(var(--accent-rgb),.15);}
.task-item.active .task-name{color:var(--accent);}
.task-item.done-task{opacity:.5;}
.task-item.dragging{opacity:.25;}
.task-item.drag-over-top{box-shadow:inset 0 2px 0 var(--accent);}
.task-item.drag-over-indent{border-left:3px solid #06D6A0;background:var(--drag-over);}
.task-item.deleted-card{opacity:.35;}

.indent-guide{display:flex;flex-shrink:0;}
.indent-segment{width:20px;border-right:1px solid var(--indent-line);align-self:stretch;}

.task-left{
  display:flex;align-items:flex-start;gap:7px;
  flex:1;min-width:0;padding:9px 8px 9px 12px;
}
.drag-handle{
  display:flex;flex-direction:column;gap:2px;
  flex-shrink:0;opacity:0;cursor:grab;padding:2px 1px;margin-top:2px;
  transition:opacity .15s;
}
.task-item:hover .drag-handle{opacity:.25;}
.drag-handle:hover{opacity:.6!important;}
.drag-handle span{width:10px;height:1.5px;background:var(--muted);border-radius:1px;display:block;}

.chk{
  width:16px;height:16px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#fff;cursor:pointer;
  transition:all .15s;flex-shrink:0;margin-top:2px;
}
.chk:hover{border-color:var(--accent);}
.chk.on{background:var(--accent);border-color:var(--accent);color:var(--accent-text);}
.chk.chk-partial{border-color:var(--accent);border-style:dashed;opacity:.75;}
.chk.chk-blocked{border-color:var(--accent2)!important;animation:chk-shake .35s ease;}
@keyframes chk-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.done-section-label{font-size:9px;letter-spacing:2px;color:var(--dim);padding:10px 14px 4px;font-family:'IBM Plex Mono',monospace;border-top:1px solid var(--border);margin-top:4px;}

/* two-line content */
.task-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}

/* line 1 — title */
.task-title-row{display:flex;align-items:center;gap:0;}
.task-name{
  font-size:14px;font-weight:400;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;
}
.task-name.done{text-decoration:line-through;color:var(--dim);}
.task-name-edit{
  font-size:14px;font-weight:400;background:transparent;border:none;
  border-bottom:1.5px solid var(--accent);color:var(--text);
  outline:none;font-family:'IBM Plex Sans',sans-serif;min-width:80px;width:100%;
}
.collapse-btn{
  background:var(--hover);
  border:1px solid var(--border2);
  color:var(--muted);
  cursor:pointer;
  font-size:11px;
  padding:2px 7px;
  border-radius:5px;
  transition:all .15s;
  flex-shrink:0;
  line-height:1.4;
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
}
.collapse-btn:hover{color:var(--text);border-color:var(--muted);background:var(--surface2);}

/* line 2 — tags only, hidden when empty */
.task-tags-row{
  display:flex;flex-wrap:wrap;align-items:center;gap:4px;
}
.task-tags-row:empty{display:none;}
.task-tag{
  font-size:10px;padding:2px 8px 2px 7px;border-radius:4px;
  border:1px solid #d4d2ca;border-left-width:3px;
  cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-weight:500;
  background:#f0efea;color:#2a2a28;
  transition:filter .15s;white-space:nowrap;line-height:1.6;
}
.task-tag:hover{filter:brightness(.95);}
.task-tag .cat{opacity:.45;margin-right:2px;font-size:9px;}
.subtask-count{
  font-size:11px;color:var(--dim);font-family:'IBM Plex Mono',monospace;white-space:nowrap;
}

/* ── STALENESS INDICATOR ── */
.stale-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  margin-right:2px;align-self:center;transition:background .3s;
}
.stale-dot.stale-warn{background:#c8973a;}  /* 7–13 days — amber  */
.stale-dot.stale-crit{background:#d45f5f;}  /* 14+ days  — red    */
/* dim the left border of stale tasks when not selected */
.task-item:not(.active).stale-warn{border-left-color:rgba(200,151,58,.45)!important;}
.task-item:not(.active).stale-crit{border-left-color:rgba(212,95,95,.6)!important;}

.task-right{display:flex;align-items:center;padding:0 4px;flex-shrink:0;}
.task-action{
  background:none;border:none;color:var(--dim);cursor:pointer;
  font-size:12px;padding:4px 5px;border-radius:4px;
  transition:all .15s;opacity:0;
}
.task-item:hover .task-action{opacity:1;}
.task-action:hover{color:var(--muted);}
.task-action.del:hover{color:var(--accent2);}
.task-children{padding-left:20px;}
.task-children.collapsed{display:none;}

.task-status-badge{font-size:8px;padding:2px 7px;border-radius:99px;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;border:1px solid;white-space:nowrap;}
.badge-archived{border-color:rgba(0,121,107,.4);color:#00796B;background:rgba(0,121,107,.08);}
.badge-trashed{border-color:rgba(239,71,111,.4);color:#EF476F;background:rgba(239,71,111,.08);}
.empty-state{text-align:center;padding:60px 20px;color:var(--dim);}
.empty-state .big{font-size:36px;margin-bottom:12px;opacity:.3;}
.empty-state h3{font-size:16px;font-weight:600;color:var(--muted);margin-bottom:6px;}
.empty-state p{font-size:12px;}

/* DETAIL DROP TARGET */
#detail.drop-target{border-left:2px solid var(--accent)!important;background:rgba(0,121,107,.04);}
#detail.drop-target .detail-drop-hint{display:flex!important;}
.detail-drop-hint{display:none;position:absolute;top:0;left:0;right:0;bottom:0;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:rgba(0,121,107,.07);border:2px dashed var(--accent);z-index:10;pointer-events:none;}
.hint-icon{font-size:32px;opacity:.6;}
.hint-text{font-size:12px;color:var(--accent);letter-spacing:1px;font-family:'IBM Plex Mono',monospace;font-weight:500;}
.hint-sub{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}

/* DETAIL PANEL — resizable */
#detail{
  width:420px;min-width:280px;max-width:calc(100vw - 440px);
  background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:row;overflow:hidden;
  position:relative;flex-shrink:0;
  transition:width .25s;
}
#detail.hidden{width:0;min-width:0;border-left:none;}
#detail.resizing{transition:none;}

/* drag-to-resize handle */
#detail-resize{
  width:5px;min-width:5px;cursor:col-resize;
  position:relative;z-index:10;flex-shrink:0;
  background:transparent;transition:background .15s;
}
#detail-resize:hover,#detail-resize.dragging{background:var(--accent);}
#detail-resize::after{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:1px;height:40px;background:var(--border2);border-radius:1px;
  transition:background .15s;
}
#detail-resize:hover::after,#detail-resize.dragging::after{background:var(--accent);}

#detail-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.detail-inner{flex:1;overflow-y:auto;padding:20px 18px;}
.detail-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim);text-align:center;}
.detail-empty .big{font-size:40px;opacity:.3;}
.detail-empty p{font-size:11px;letter-spacing:.5px;}
.d-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px 8px;border-radius:4px;transition:all .15s;z-index:2;}
.d-close:hover{color:var(--text);background:var(--hover);}
.d-task-name{font-size:20px;font-weight:600;line-height:1.35;color:var(--text);cursor:pointer;border-bottom:2px solid transparent;transition:border-color .2s;padding-bottom:2px;padding-right:28px;margin-bottom:4px;}
.d-task-name:hover{border-color:var(--border2);}
.d-task-name-edit{font-size:20px;font-weight:600;background:transparent;border:none;border-bottom:2px solid var(--accent);color:var(--text);outline:none;width:100%;font-family:'IBM Plex Sans',sans-serif;padding-right:28px;}
.d-section{margin-bottom:26px;}
.d-section-hd{
  font-size:12px;font-weight:600;letter-spacing:.3px;
  color:var(--text);margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
  font-family:'IBM Plex Sans',sans-serif;
  padding-bottom:7px;border-bottom:1px solid var(--border);
}
.d-section-hd .hd-meta{font-size:10px;font-weight:400;color:var(--muted);}
.d-section-hd button{background:none;border:none;color:var(--muted);font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;padding:0;transition:color .15s;}
.d-section-hd button:hover{color:var(--accent);}
.cat-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.cat-row:last-child{border-bottom:none;}
.cat-label{font-size:12px;color:var(--muted);width:84px;min-width:84px;padding-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.cat-tags{display:flex;flex-wrap:wrap;gap:4px;flex:1;align-items:center;}
.d-tag{font-size:11px;padding:4px 10px 4px 8px;border-radius:4px;border:1px solid #d4d2ca;border-left-width:3px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-weight:500;background:#f0efea;color:#2a2a28;display:flex;align-items:center;gap:4px;transition:all .15s;}
.d-tag .rm{opacity:0;font-size:12px;line-height:1;margin-left:2px;color:#888;}
.d-tag:hover .rm{opacity:1;}
.d-tag:hover{background:#e8e6e0;}
.d-tag-off{font-size:11px;padding:4px 10px 4px 8px;border-radius:4px;border:1px solid #d4d2ca;border-left-width:3px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-weight:400;background:#f8f7f4;color:#888;display:flex;align-items:center;gap:4px;transition:all .15s;}
.d-tag-off:hover{background:#e8e6e0;color:#2a2a28;}
.cat-new-inp{background:none;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:10px;padding:1px 4px;outline:none;width:80px;transition:border-color .2s;}
.cat-new-inp:focus{border-bottom-color:var(--accent);width:100px;}
.cat-new-inp::placeholder{color:var(--dim);}
.tag-popup{position:fixed;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px;min-width:180px;z-index:1000;box-shadow:0 8px 32px var(--shadow);}
.tag-popup-title{font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;}
.tag-popup-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.tag-popup-inp{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:12px;border-radius:4px;padding:5px 9px;outline:none;transition:all .2s;}
.tag-popup-inp:focus{border-color:var(--accent);}
.tag-popup-inp::placeholder{color:var(--dim);}
.tag-popup-hint{font-size:9px;color:var(--dim);margin-top:5px;font-family:'IBM Plex Mono',monospace;}
.add-cat-row{margin-top:8px;display:flex;gap:6px;}
.add-cat-inp{flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:12px;border-radius:4px;padding:5px 9px;outline:none;transition:all .2s;}
.add-cat-inp:focus{border-color:var(--accent);}
.add-cat-inp::placeholder{color:var(--dim);}

/* RTE */
.rte-wrap{border:1.5px solid var(--border2);border-radius:8px;overflow:hidden;transition:border-color .2s;}
.rte-wrap:focus-within{border-color:var(--accent);}
.rte-toolbar{display:flex;align-items:center;gap:2px;padding:5px 8px;border-bottom:1px solid var(--border2);flex-wrap:wrap;background:var(--surface2);}
.rte-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:3px 6px;border-radius:4px;transition:all .15s;font-family:'IBM Plex Mono',monospace;min-width:24px;}
.rte-btn:hover{background:var(--hover);color:var(--text);}
.rte-sep{width:1px;height:16px;background:var(--border2);margin:0 3px;flex-shrink:0;}
.rte-editor{min-height:100px;padding:10px 12px;outline:none;font-size:13px;line-height:1.7;color:var(--text);background:var(--surface);font-family:'IBM Plex Sans',sans-serif;}
.rte-editor[data-empty]:empty:before{content:attr(data-placeholder);color:var(--dim);font-style:italic;pointer-events:none;}
.rte-editor b,.rte-editor strong{font-weight:700;}
.rte-editor i,.rte-editor em{font-style:italic;}
.rte-editor u{text-decoration:underline;}
.rte-editor ul,.rte-editor ol{padding-left:20px;}
.rte-editor blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--muted);margin:4px 0;}
.rte-display{font-size:13px;line-height:1.7;color:var(--text);padding:8px 10px;border-radius:6px;border:1.5px solid transparent;cursor:pointer;min-height:36px;transition:all .2s;}
.rte-display:hover{border-color:var(--border2);}
.rte-display.empty{color:var(--dim);font-style:italic;}
.rte-display b,.rte-display strong{font-weight:700;}
.rte-display i,.rte-display em{font-style:italic;}
.rte-display ul,.rte-display ol{padding-left:20px;}
.rte-display blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--muted);}

/* SUBTASKS IN DETAIL */
.sub-add-row{display:flex;gap:7px;margin-top:8px;align-items:center;}
.sub-add-inp{flex:1;background:var(--bg);border:1.5px solid var(--border2);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:12px;border-radius:6px;padding:6px 10px;outline:none;transition:all .2s;}
.sub-add-inp:focus{border-color:var(--accent);}
.sub-add-inp::placeholder{color:var(--dim);}
.d-sub-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.d-sub-row:hover{background:var(--hover);border-color:var(--border);}
.d-sub-row.active-sub{border-color:var(--accent);background:var(--hover);}
.d-sub-row.d-sub-done{opacity:.5;}
.d-sub-row.sub-drag-over{border-top:2px solid var(--accent);}
.d-sub-row.sub-dragging{opacity:.2;}
.d-sub-drag{
  font-size:13px;color:var(--dim);cursor:grab;opacity:0;
  flex-shrink:0;line-height:1;padding:0 2px;transition:opacity .15s;user-select:none;
}
.d-sub-row:hover .d-sub-drag{opacity:.45;}
.d-sub-drag:hover{opacity:1!important;}
.d-sub-title{font-size:13px;flex:1;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s;}
.d-sub-title:hover{border-bottom-color:var(--border2);}
.d-sub-title-edit{font-size:13px;background:transparent;border:none;border-bottom:1.5px solid var(--accent);color:var(--text);outline:none;flex:1;font-family:'IBM Plex Sans',sans-serif;}
.d-sub-actions{display:flex;align-items:center;gap:1px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.d-sub-row:hover .d-sub-actions{opacity:1;}
.d-sub-act{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;padding:3px 5px;border-radius:4px;transition:all .15s;line-height:1;font-family:'IBM Plex Sans',sans-serif;}
.d-sub-act:hover{background:var(--hover);color:var(--text);}
.d-sub-act.del:hover{color:#d45f5f;}
.d-sub-act.promote:hover{color:var(--accent);}

/* COMMENTS */
.comment-list{display:flex;flex-direction:column;gap:10px;}
.comment-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;transition:border-color .2s;}
@keyframes rowIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.comment-card:hover{border-color:var(--border2);}
.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.comment-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
.comment-meta{flex:1;}
.comment-author{font-size:12px;font-weight:600;color:var(--text);}
.comment-time{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
.comment-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.comment-card:hover .comment-actions{opacity:1;}
.comment-act-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:10px;padding:3px 6px;border-radius:4px;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;}
.comment-act-btn:hover{background:var(--hover);color:var(--text);}
.comment-act-btn.del:hover{color:var(--accent2);}
.comment-body{font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.comment-edit-area{width:100%;background:var(--bg);border:1.5px solid var(--accent);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.6;border-radius:6px;padding:8px 10px;outline:none;resize:vertical;min-height:60px;}
.comment-edit-actions{display:flex;gap:6px;margin-top:6px;}
.comment-inp-wrap{margin-bottom:14px;}
.comment-inp{width:100%;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.6;border-radius:8px;padding:10px 12px;outline:none;resize:none;min-height:44px;transition:all .2s;}
.comment-inp:focus{border-color:var(--accent);min-height:80px;}
.comment-inp::placeholder{color:var(--dim);}
.comment-submit-row{display:flex;justify-content:flex-end;gap:6px;margin-top:6px;}

/* BUTTONS */
.btn{background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:11px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.btn:hover{border-color:var(--muted);}
.btn.accent{background:var(--accent);border-color:var(--accent);color:var(--accent-text);font-weight:600;}
.btn.accent:hover{opacity:.9;}
.btn.danger{border-color:rgba(239,71,111,.4);color:#EF476F;}
.btn.danger:hover{background:#EF476F;color:#fff;border-color:#EF476F;}
.btn.restore{border-color:rgba(6,214,160,.4);color:#06D6A0;}
.btn.restore:hover{background:#06D6A0;color:#000;border-color:#06D6A0;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── SETTINGS MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .15s ease;
}
body.light .modal-overlay{background:rgba(10,12,20,.45);}
.modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:14px;
  width:620px;max-width:95vw;max-height:88vh;display:flex;flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden;
}
body.light .modal{box-shadow:0 24px 80px rgba(15,17,30,.25);}
.modal-header{
  display:flex;align-items:center;gap:12px;padding:18px 22px 14px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-title{font-size:16px;font-weight:700;flex:1;letter-spacing:-.3px;}
.modal-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:5px;transition:all .15s;line-height:1;}
.modal-close:hover{color:var(--text);background:var(--hover);}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 22px;flex-shrink:0;}
.modal-tab{padding:11px 16px;font-size:11px;font-weight:500;letter-spacing:.3px;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;}
.modal-tab:hover{color:var(--text);}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.modal-body{flex:1;overflow-y:auto;padding:22px;}
.settings-section{margin-bottom:28px;}
.settings-section-title{font-size:12px;font-weight:600;letter-spacing:.2px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* category cards */
.cat-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  margin-bottom:10px;overflow:hidden;transition:border-color .2s;
}
.cat-card:hover{border-color:var(--border2);}
.cat-card-header{
  display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
}
.cat-card-name{font-size:13px;font-weight:600;flex:1;color:var(--text);}
.cat-card-count{font-size:9px;color:var(--dim);font-family:'IBM Plex Mono',monospace;background:var(--hover);padding:2px 7px;border-radius:99px;}
.cat-card-toggle{font-size:10px;color:var(--dim);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .15s;}
.cat-card-toggle:hover{background:var(--hover);color:var(--text);}
.cat-card-body{padding:0 14px 12px;border-top:1px solid var(--border);display:none;}
.cat-card-body.open{display:block;}
.tag-chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0 6px;}
.tag-chip{
  display:inline-flex;align-items:center;gap:5px;font-size:10px;
  padding:4px 10px 4px 8px;border-radius:4px;
  border:1px solid #d4d2ca;border-left-width:3px;
  background:#f0efea;color:#2a2a28;font-weight:500;
  font-family:'IBM Plex Sans',sans-serif;transition:all .15s;
}
.tag-chip-del{background:none;border:none;cursor:pointer;opacity:.4;font-size:12px;line-height:1;padding:0;transition:opacity .15s;color:inherit;}
.tag-chip-del:hover{opacity:1;}
.tag-chip-rename{background:none;border:none;cursor:pointer;opacity:.4;font-size:10px;line-height:1;padding:0 2px;transition:opacity .15s;color:inherit;font-family:'IBM Plex Mono',monospace;}
.tag-chip-rename:hover{opacity:1;}
.tag-add-row{display:flex;gap:7px;margin-top:4px;}
.tag-add-inp{flex:1;background:var(--bg);border:1.5px solid var(--border2);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:12px;border-radius:6px;padding:6px 10px;outline:none;transition:all .2s;}
.tag-add-inp:focus{border-color:var(--accent);}
.tag-add-inp::placeholder{color:var(--dim);}
.cat-rename-inp{background:transparent;border:none;border-bottom:2px solid var(--accent);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;outline:none;width:160px;}
.cat-del-btn{background:none;border:none;cursor:pointer;color:var(--dim);font-size:13px;padding:3px 6px;border-radius:5px;transition:all .15s;}
.cat-del-btn:hover{color:var(--accent2);background:rgba(239,71,111,.08);}

/* theme toggle in settings */
.theme-option{
  display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;
  border:1.5px solid var(--border);cursor:pointer;transition:all .2s;background:var(--surface2);
}
.theme-option:hover{border-color:var(--border2);}
.theme-option.selected{border-color:var(--accent);background:var(--hover);}
.theme-option-icon{font-size:24px;width:36px;text-align:center;}
.theme-option-label{font-size:13px;font-weight:600;color:var(--text);}
.theme-option-desc{font-size:11px;color:var(--dim);margin-top:2px;}
.theme-options-row{display:flex;gap:10px;}
.theme-options-row .theme-option{flex:1;}

/* settings gear btn in left panel */
.settings-btn{
  display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;
  background:none;border:none;color:#00897B;font-family:'IBM Plex Sans',sans-serif;
  font-size:12px;font-weight:500;letter-spacing:.3px;cursor:pointer;border-radius:6px;transition:all .15s;
}
.settings-btn:hover{background:rgba(0,137,123,.1);color:#00695C;}
.settings-btn .icon{font-size:18px;line-height:1;}

/* toggle pill */
.toggle-pill{
  margin-left:auto;width:28px;height:16px;border-radius:99px;
  background:var(--border2);flex-shrink:0;position:relative;
  transition:background .2s;
}
.toggle-pill::after{
  content:'';position:absolute;top:2px;left:2px;
  width:12px;height:12px;border-radius:50%;background:#fff;
  transition:transform .2s;
}
.toggle-pill.on{background:var(--accent);}
.toggle-pill.on::after{transform:translateX(12px);}

/* ── COMPACT MODE — labels hidden, single line ── */
#task-area.compact .task-tags-row{display:none!important;}
#task-area.compact .task-item{align-items:center;}
#task-area.compact .task-left{padding-top:5px;padding-bottom:5px;}
#task-area.compact .chk{margin-top:0;}

/* ── BREADCRUMB ── */
.task-breadcrumb{
  display:flex;align-items:center;flex-wrap:wrap;gap:2px;
  margin-bottom:10px;
}
.bc-seg{
  font-size:10px;color:var(--muted);cursor:pointer;
  padding:2px 5px;border-radius:4px;
  transition:all .15s;white-space:nowrap;
  font-family:'IBM Plex Sans',sans-serif;
  max-width:140px;overflow:hidden;text-overflow:ellipsis;
}
.bc-seg:hover{background:var(--hover);color:var(--accent);}
.bc-sep{font-size:10px;color:var(--dim);padding:0 1px;user-select:none;}
.bc-current{
  font-size:10px;color:var(--dim);
  padding:2px 5px;white-space:nowrap;
  font-family:'IBM Plex Sans',sans-serif;
  max-width:160px;overflow:hidden;text-overflow:ellipsis;
  font-style:italic;
}
.mini-cal{
  margin:12px 0 4px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 8px 8px;
  flex-shrink:0;
}
.cal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.cal-month{font-size:11px;font-weight:700;color:var(--text);letter-spacing:.2px;}
.cal-nav{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:1px 5px;border-radius:4px;line-height:1;transition:all .15s;}
.cal-nav:hover{background:var(--hover);color:var(--text);}
.cal-grid{
  display:grid;
  grid-template-columns:24px repeat(7,1fr);
  gap:1px 0;
}
.cal-dow{
  font-size:8px;font-weight:600;color:var(--dim);
  text-align:center;padding-bottom:4px;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;
}
.cal-wk-label{
  font-size:8px;color:var(--dim);font-family:'IBM Plex Mono',monospace;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:4px;line-height:1;
}
.cal-day{
  font-size:10px;color:var(--muted);text-align:center;
  padding:3px 1px;border-radius:4px;cursor:default;
  font-family:'IBM Plex Mono',monospace;line-height:1.4;
  transition:background .1s;
}
.cal-day.other-month{color:var(--dim);opacity:.4;}
.cal-day.today{
  background:var(--accent);color:#fff;font-weight:700;border-radius:50%;
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  margin:auto;
}
.cal-day.today-row .cal-wk-label{color:var(--accent);font-weight:700;}
.view-mode-row{
  display:flex;gap:4px;padding:10px 12px 0;
}
.view-mode-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:7px 8px;border-radius:7px;border:1.5px solid var(--border);
  background:none;color:var(--muted);font-family:'IBM Plex Sans',sans-serif;
  font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;
}
.view-mode-btn:hover{border-color:#00897B;color:#00897B;}
.view-mode-btn.active{border-color:#00897B;color:#00897B;background:rgba(0,137,123,.1);}
.view-mode-btn .icon{font-size:16px;line-height:1;}

/* ── KANBAN PAGE ── */
#kanban-page{
  display:none;flex:1;flex-direction:column;overflow:hidden;
  background:var(--bg);min-width:0;
}
#kanban-page.visible{display:flex;}

/* topbar shared with list view — category selector shown in kanban */
.kanban-topbar{
  display:flex;align-items:center;gap:12px;padding:12px 18px;
  border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;
}
.kanban-topbar-title{font-size:15px;font-weight:700;color:var(--text);flex:1;}
.kanban-cat-select-wrap{display:flex;align-items:center;gap:8px;}
.kanban-cat-label{font-size:11px;color:var(--muted);font-weight:500;}
.kanban-cat-select{
  background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;
  border-radius:7px;padding:6px 10px;outline:none;cursor:pointer;
  transition:border-color .15s;
}
.kanban-cat-select:focus{border-color:var(--accent);}
.kanban-filter-note{font-size:10px;color:var(--dim);}

/* board scroll area */
#kanban-board{
  flex:1;overflow-x:auto;overflow-y:hidden;
  display:flex;align-items:flex-start;
  padding:18px 16px;gap:14px;
}
#kanban-board::-webkit-scrollbar{height:6px;}
#kanban-board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* column */
.kb-col{
  width:260px;min-width:260px;display:flex;flex-direction:column;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;flex-shrink:0;
  max-height:calc(100vh - 130px);
}
.kb-col-header{
  padding:12px 14px 10px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.kb-col-title{
  font-size:13px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.kb-col-title .col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.kb-col-count{
  font-size:10px;color:var(--muted);background:var(--hover);
  padding:1px 7px;border-radius:99px;margin-left:auto;
}
.kb-col-body{
  flex:1;overflow-y:auto;padding:10px 10px 14px;
  display:flex;flex-direction:column;gap:7px;
}
.kb-col-body::-webkit-scrollbar{width:3px;}
.kb-col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* kanban task card */
.kb-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;padding:11px 13px;cursor:pointer;
  transition:all .15s;animation:fadeIn .2s ease;
}
.kb-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 16px var(--shadow);}
.kb-card.active{border-color:var(--accent);}
.kb-card.done{opacity:.5;}
.kb-card-title{
  font-size:13px;font-weight:500;color:var(--text);
  line-height:1.4;margin-bottom:7px;
}
.kb-card-title.done{text-decoration:line-through;color:var(--dim);}
.kb-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.kb-card-meta{
  display:flex;align-items:center;gap:6px;margin-top:6px;
  font-size:9px;color:var(--dim);font-family:'IBM Plex Mono',monospace;
}
.kb-card-meta .sub-badge{
  background:var(--hover);border:1px solid var(--border);
  padding:1px 6px;border-radius:3px;
}
.kb-card-check{
  width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:8px;
  color:#fff;cursor:pointer;transition:all .15s;flex-shrink:0;margin-left:auto;
}
.kb-card-check:hover{border-color:var(--accent);}
.kb-card-check.on{background:var(--accent);border-color:var(--accent);}
.kb-empty-col{
  text-align:center;padding:28px 10px;color:var(--dim);font-size:11px;
  border:1.5px dashed var(--border);border-radius:8px;margin:4px 0;
}
.kb-no-cat{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;color:var(--dim);text-align:center;
  padding:40px;
}
.kb-no-cat .big{font-size:40px;opacity:.25;}

.kb-card-path{
  display:flex;align-items:center;flex-wrap:wrap;gap:1px;
  margin-bottom:4px;
}
.kb-path-seg{
  font-size:9px;color:var(--dim);cursor:pointer;
  font-family:'IBM Plex Sans',sans-serif;
  padding:0 2px;border-radius:3px;
  max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  transition:color .15s;
}
.kb-path-seg:hover{color:var(--accent);}
.kb-path-sep{font-size:9px;color:var(--dim);padding:0 1px;user-select:none;}
.kb-card{cursor:grab;}
.kb-card:active{cursor:grabbing;}
.kb-card.kb-dragging{opacity:.35;transform:scale(.97);}
.kb-col-body.kb-drag-over{
  background:rgba(0,121,107,.06);
  outline:2px dashed var(--accent);
  outline-offset:-4px;
  border-radius:8px;
}
/* copy-mode cursor feedback */
body.kb-copy-mode .kb-card{cursor:copy;}
.kb-drop-indicator{
  height:3px;background:var(--accent);border-radius:99px;
  margin:3px 0;transition:none;
}
/* ctrl badge on card while dragging */
.kb-copy-badge{
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
  background:var(--accent);color:#fff;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:5px;display:none;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;
}

/* STATUS FILTER */
.status-chips{display:flex;flex-direction:column;gap:3px;margin-bottom:4px;}
.status-chip{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:11px;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-weight:500;transition:all .15s;color:var(--muted);background:transparent;width:100%;text-align:left;}
.status-chip:hover{background:var(--hover);color:var(--text);border-color:var(--border2);}
.status-chip.on{font-weight:600;}
.status-chip[data-s="active"].on{border-color:#06D6A0;color:#06D6A0;background:rgba(6,214,160,.08);}
.status-chip[data-s="done"].on{border-color:#8888ff;color:#8888ff;background:rgba(136,136,255,.08);}
.status-chip[data-s="archived"].on{border-color:var(--muted);color:var(--text);background:var(--hover);}
.status-chip[data-s="trashed"].on{border-color:#EF476F;color:#EF476F;background:rgba(239,71,111,.08);}
.status-chip-count{font-size:10px;font-family:'IBM Plex Mono',monospace;opacity:.7;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-dot.active{background:#06D6A0;}.status-dot.done{background:#8888ff;}.status-dot.archived{background:var(--muted);}.status-dot.trashed{background:#EF476F;}
/* inline status badge in unified status-filter list */
.task-status-pill{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 6px;border-radius:99px;letter-spacing:.5px;flex-shrink:0;}
.task-status-pill.active{background:rgba(6,214,160,.12);color:#06D6A0;}
.task-status-pill.done{background:rgba(136,136,255,.12);color:#8888ff;}
.task-status-pill.archived{background:var(--hover);color:var(--muted);}
.task-status-pill.trashed{background:rgba(239,71,111,.12);color:#EF476F;}

/* SEARCH BAR */
#search-bar{display:none;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;align-items:center;gap:8px;}
#search-bar.show{display:flex;}
.search-inp{flex:1;background:var(--surface2);border:1.5px solid var(--accent);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;border-radius:7px;padding:7px 12px;outline:none;transition:border-color .2s;}
.search-inp::placeholder{color:var(--dim);}
.search-count{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.search-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:3px 6px;border-radius:4px;transition:color .15s;flex-shrink:0;}
.search-close:hover{color:var(--accent2);}
#search-toggle.search-active{color:var(--accent);border-color:var(--accent);}

/* ── BOTTOM READING PANE ─────────────────────────────────────── */
/* Grid: left sidebar spans full height; detail panel is below main only */
#app.pane-bottom{
  display:grid;
  grid-template-columns:auto auto 1fr;
  grid-template-rows:1fr auto;
}
#app.pane-bottom #left      {grid-area:1/1/3/2;}  /* spans both rows */
#app.pane-bottom #left-resize{grid-area:1/2/3/3;} /* spans both rows */
#app.pane-bottom #main      {grid-area:1/3/2/4;overflow:hidden;}
#app.pane-bottom #kanban-page{grid-area:1/3/2/4;}
#app.pane-bottom #detail{
  grid-area:2/3/3/4;
  width:100%!important;max-width:100%!important;min-width:0!important;
  height:var(--tf-bottom-h,280px);min-height:120px;
  border-left:none;border-top:1px solid var(--border2);
  flex-direction:column;
  transition:height .25s;
}
#app.pane-bottom #detail.resizing{transition:none;}
#app.pane-bottom #detail.hidden{height:0!important;min-height:0!important;border-top:none;}
#app.pane-bottom #detail-resize{
  width:100%;height:5px;min-width:unset;cursor:row-resize;flex-shrink:0;
}
#app.pane-bottom #detail-resize::after{width:40px;height:1px;}
#app.pane-bottom #detail-content{flex:1;min-height:0;}
/* pane position icons used in settings */
.pane-icon{font-size:20px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:-1px;color:var(--muted);line-height:1;}</style>
</head>
<body>
<div id="app">
  <!-- LEFT FILTER PANEL -->
  <div id="left">
    <div class="left-top">
      <div class="logo">task<span>flow</span>.</div>
      <div class="tagline"><span class="sync-dot" id="sync-dot"></span><span id="sync-label">CONNECTING...</span></div>
      <div class="app-version">v1.44 - Reading pane</div>
    </div>
    <div class="filter-panel">
      <div class="view-mode-row">
        <button class="view-mode-btn active" id="vmode-list" onclick="setAppMode('list')" title="List view">
          <span class="icon">☰</span> List
        </button>
        <button class="view-mode-btn" id="vmode-kanban" onclick="setAppMode('kanban')" title="Kanban board">
          <span class="icon">⊞</span> Kanban
        </button>
      </div>
      <div style="height:1px;background:var(--border);margin:12px 0 10px;"></div>
      <div class="filter-section-title">Status <button class="filter-clear" id="status-filter-clear" onclick="clearStatusFilter()" style="display:none;">Clear</button></div>
      <div id="status-chips" class="status-chips"></div>
      <div style="height:1px;background:var(--border);margin:10px 0;"></div>
      <div class="filter-section-title">Filter by Tags <button class="filter-clear" onclick="clearAllFilters()">Clear all</button></div>
      <div id="filter-cats"></div>
      <div class="mini-cal" id="mini-cal"></div>
    </div>
    <div class="left-bottom">
      <button class="settings-btn" id="labels-toggle-btn" onclick="toggleLabels()">
        <span class="icon">🏷</span>
        <span id="labels-toggle-text">Labels On</span>
        <span class="toggle-pill on" id="labels-toggle-pill"></span>
      </button>
      <button class="settings-btn" onclick="openSettings()">
        <span class="icon">⚙</span> Settings
      </button>
    </div>
  </div>

  <div id="left-resize" title="Drag to resize"></div>

  <!-- MAIN -->

    <div id="topbar">
      <button class="topbar-toggle" onclick="toggleLeft()" id="left-toggle">◀</button>
      <div class="add-task-wrap">

        <button class="btn accent" onclick="addTask()">+ ADD</button>

      <button class="topbar-toggle" onclick="toggleSearch()" id="search-toggle" title="Search tasks (/)">⌕</button>
      <button class="topbar-toggle" onclick="toggleDetail()" id="detail-toggle" title="Toggle detail panel">▶</button>
    </div>
    <div id="search-bar">
      <input class="search-inp" id="search-inp" placeholder="Search by title or content… (Esc to close)" oninput="setSearch(this.value)" onkeydown="if(event.key==='Escape')clearSearch()"/>
      <span class="search-count" id="search-count"></span>
      <button class="search-close" onclick="clearSearch()" title="Clear search">✕</button>
    </div>
    <div class="filter-active-bar" id="filter-active-bar"></div>
    <div class="view-tabs">
      <button class="view-tab active" id="tab-active" onclick="setView('active')">ACTIVE <span class="archive-badge-count" id="badge-active">0</span></button>
      <button class="view-tab" id="tab-archive" onclick="setView('archive')">ARCHIVE <span class="archive-badge-count" id="badge-archive">0</span></button>
      <button class="view-tab" id="tab-trash" onclick="setView('trash')">TRASH <span class="archive-badge-count" id="badge-trash">0</span></button>

  <!-- DETAIL PANEL -->
  <div id="detail">
    <div id="detail-resize" title="Drag to resize"></div>
    <div id="detail-content" ondragover="onDetailDragOver(event)" ondragleave="onDetailDragLeave(event)" ondrop="onDetailDrop(event)">
      <div class="detail-drop-hint">
        <div class="hint-icon">⤵</div>
        <div class="hint-text">DROP AS SUBTASK</div>
        <div class="hint-sub" id="detail-drop-label">of current task</div>
      </div>
      <div class="detail-inner" id="detail-inner">
        <div class="detail-empty"><div class="big">◈</div><p>SELECT A TASK<br/>TO VIEW DETAILS</p></div>

  <!-- KANBAN PAGE -->
  <div id="kanban-page">

<!-- SETTINGS MODAL -->

        <button class="modal-tab active" id="stab-categories" onclick="switchSettingsTab('categories')">CATEGORIES & TAGS</button>
        <button class="modal-tab" id="stab-appearance" onclick="switchSettingsTab('appearance')">APPEARANCE</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── FIREBASE ─────────────────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyBximBiVx6SG5cCHKVTiRmYJurXrnh8wCY",
  authDomain:"taskflowapp671321.firebaseapp.com",
  projectId:"taskflowapp671321",
  storageBucket:"taskflowapp671321.firebasestorage.app",
  messagingSenderId:"522756922440",
  appId:"1:522756922440:web:86c4ac9621d3c151f5cc7d"
};
let db=null, usingLocal=false;

function setSync(s){
  const dot=document.getElementById('sync-dot'),lbl=document.getElementById('sync-label');
  if(!dot||!lbl) return;
  dot.className='sync-dot'+(s==='live'?' live':s==='error'?' error':'');
  lbl.textContent=s==='live'?'FIREBASE LIVE':s==='error'?'SYNC ERROR':'LOCAL ONLY';
}

// ── STATE ────────────────────────────────────────────────────────
// Monochrome pill base — same neutral grey for all tags
// accent is a per-category color used only as a left-border hint
const CAT_ACCENTS=['#5b8fc9','#4aaa7a','#d45f5f','#c8973a','#8b6dc9','#3aacb8','#b87a3a','#9a5aa0'];
let catColorMap={};
let catColorCounter=0;
function getCatAccent(cat){
  if(catColorMap[cat]===undefined){catColorMap[cat]=catColorCounter%CAT_ACCENTS.length;catColorCounter++;}
  return CAT_ACCENTS[catColorMap[cat]];
}
// All pills use neutral grey — accent is exposed separately via c.accent
function getTagColor(cat,val){
  return {
    bg:'#f0efea',
    border:'#d4d2ca',
    text:'#2a2a28',
    accent:getCatAccent(cat)
  };
}
const DEFAULT_CATS=['Project','Priority','Bucket','Status'];
let state={tasks:[],categories:[...DEFAULT_CATS],tagColors:{},tagColorCounter:0,filters:{},definedTags:{},activeTaskId:null,collapsed:{},collapsedCats:{},leftOpen:true,detailOpen:true};
let currentView='active';

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function now(){return Date.now();}

// ── PERSISTENCE ──────────────────────────────────────────────────
async function fbSave(){
  if(usingLocal||!db){lsSave();return;}
  try{
    await setDoc(doc(db,'taskflow_v2','appstate'),{tasks:state.tasks,categories:state.categories,tagColors:state.tagColors,tagColorCounter:state.tagColorCounter,collapsed:state.collapsed,collapsedCats:state.collapsedCats,definedTags:state.definedTags,updatedAt:now()});
    lsSave();
  }catch(e){console.error('fbSave',e);lsSave();}
}
function save(){fbSave();}
function lsSave(){try{localStorage.setItem('tf2_data',JSON.stringify({tasks:state.tasks,categories:state.categories,tagColors:state.tagColors,tagColorCounter:state.tagColorCounter,collapsed:state.collapsed,collapsedCats:state.collapsedCats,definedTags:state.definedTags}));}catch(e){}}
function lsLoad(){
  try{
    const d=JSON.parse(localStorage.getItem('tf2_data')||'{}');
    if(d.tasks) state.tasks=d.tasks;
    if(d.categories) state.categories=d.categories;
    if(d.tagColors) state.tagColors=d.tagColors;
    if(d.tagColorCounter) state.tagColorCounter=d.tagColorCounter;
    if(d.collapsed) state.collapsed=d.collapsed;
    if(d.collapsedCats) state.collapsedCats=d.collapsedCats;
    if(d.definedTags) state.definedTags=d.definedTags;
    migrateTags();
  }catch(e){}
}
function migrateTags(){
  state.tasks.forEach(t=>{
    // Backfill updatedAt for tasks that predate the field
    if(!t.updatedAt) t.updatedAt=t.createdAt||now();
    Object.entries(t.tags||{}).forEach(([cat,vals])=>{
      if(!state.definedTags[cat]) state.definedTags[cat]=[];
      (vals||[]).forEach(v=>{
        if(v && !state.definedTags[cat].includes(v)) state.definedTags[cat].push(v);
      });
    });
  });
}

function applyRemoteData(data){
  if(!data) return;
  if(data.tasks) state.tasks=data.tasks;
  if(data.categories) state.categories=data.categories;
  if(data.tagColors) state.tagColors=data.tagColors;
  if(data.tagColorCounter!==undefined) state.tagColorCounter=data.tagColorCounter;
  if(data.collapsed) state.collapsed=data.collapsed;
  if(data.collapsedCats) state.collapsedCats=data.collapsedCats;
  if(data.definedTags) state.definedTags=data.definedTags;
  migrateTags();
}

async function bootFirebase(){
  setSync('connecting');
  try{
    const app=initializeApp(firebaseConfig);
    db=getFirestore(app);
    onSnapshot(doc(db,'taskflow_v2','appstate'),
      snap=>{if(snap.exists()){applyRemoteData(snap.data());lsSave();}else{fbSave();}setSync('live');render();if(state.activeTaskId)renderDetail();},
      err=>{console.error('snapshot',err);setSync('error');}
    );
  }catch(e){console.error('Firebase init',e);usingLocal=true;setSync('local');}
}

// ── TASK HELPERS ─────────────────────────────────────────────────
function getTask(id){return state.tasks.find(t=>t.id===id)||null;}
function getRootTasks(){return state.tasks.filter(t=>!t.parentId).sort((a,b)=>(a.order||0)-(b.order||0));}
function getChildren(pid){return state.tasks.filter(t=>t.parentId===pid).sort((a,b)=>(a.order||0)-(b.order||0));}

function getAncestors(id){
  const chain=[];let cur=getTask(id);
  while(cur&&cur.parentId){const p=getTask(cur.parentId);if(!p)break;chain.unshift(p);cur=p;}
  return chain;
}
function getTaskPath(id){
  const ancestors=getAncestors(id);const t=getTask(id);
  return [...ancestors.map(a=>a.text),t?t.text:''].filter(Boolean).join(' › ');
}
function getAllDescendants(id){const r=[];function walk(pid){getChildren(pid).forEach(c=>{r.push(c);walk(c.id);});}walk(id);return r;}

function addTask(text){
  const inp=document.getElementById('task-inp');
  const t=(text||inp?.value||'').trim();if(!t)return;
  // Shift all existing root tasks down so new task lands at top (order 0)
  state.tasks.filter(x=>!x.parentId&&!x.trashed).forEach(x=>x.order=(x.order||0)+1);
  const task={id:uid(),text:t,parentId:null,done:false,archived:false,trashed:false,description:'',tags:{},comments:[],createdAt:now(),updatedAt:now(),order:0};
  state.tasks.push(task);if(inp)inp.value='';
  save();render();selectTask(task.id);
}
window.addTask=addTask;

function updateTask(id,data){
  const t=getTask(id);if(!t)return;
  // Stamp updatedAt on every meaningful change (drives staleness indicator)
  if(!data.hasOwnProperty('updatedAt')) data.updatedAt=now();
  Object.assign(t,data);save();render();
  if(state.activeTaskId===id)renderDetail();
}

function trashTask(id){
  const task=getTask(id);if(!task)return;
  const children=getChildren(id);const newPid=task.parentId||null;
  const siblings=(newPid?getChildren(newPid):getRootTasks()).filter(t=>t.id!==id);
  children.forEach((c,i)=>{c.parentId=newPid;c.order=siblings.length+i;});
  task.trashed=true;task.trashedAt=now();task.archived=false;
  if(state.activeTaskId===id)state.activeTaskId=null;
  save();render();renderDetail();
}
window.trashTask=trashTask;

function archiveTask(id){
  const children=getChildren(id).filter(c=>!c.trashed);
  const undone=children.filter(c=>!c.done&&!c.archived);
  if(undone.length>0){
    // Flash the Mark Complete button area
    const btn=document.querySelector(`#detail-inner .btn.accent`);
    if(btn){btn.style.outline='2px solid var(--accent2)';setTimeout(()=>btn.style.outline='',500);}
    return;
  }
  updateTask(id,{done:true,archived:true,trashed:false,completedAt:now()});
}
window.archiveTask=archiveTask;
function unarchiveTask(id){updateTask(id,{done:false,archived:false,completedAt:null});}
window.unarchiveTask=unarchiveTask;
function restoreTask(id){updateTask(id,{trashed:false,trashedAt:null,archived:false,done:false});}
window.restoreTask=restoreTask;

function toggleDone(id){
  const t=getTask(id);if(!t||t.trashed)return;
  if(!t.done){
    // Block if any non-trashed subtask is not yet done
    const children=getChildren(id).filter(c=>!c.trashed);
    const undone=children.filter(c=>!c.done&&!c.archived);
    if(undone.length>0){
      // Flash the checkbox red to indicate it's blocked
      const chkEl=document.querySelector(`.task-item[data-id="${id}"] .chk`);
      if(chkEl){
        chkEl.classList.add('chk-blocked');
        setTimeout(()=>chkEl.classList.remove('chk-blocked'),400);
      }
      // Also flash in detail panel subtask list if open
      const dChk=document.querySelector(`.d-sub-row[data-sub-id="${id}"] .chk`);
      if(dChk){dChk.classList.add('chk-blocked');setTimeout(()=>dChk.classList.remove('chk-blocked'),400);}
      return;
    }
    // Mark done — stays in active view and sinks to bottom (not archived yet)
    Object.assign(t,{done:true,completedAt:now()});
    save();render();
    if(state.activeTaskId===id)renderDetail();
  }else{
    updateTask(id,{done:false,archived:false,completedAt:null});
  }
}
window.toggleDone=toggleDone;

function makeSubtask(cid,pid){
  if(cid===pid)return;
  if(getAllDescendants(cid).map(d=>d.id).includes(pid))return;
  updateTask(cid,{parentId:pid,order:getChildren(pid).length});
}
function promoteToRoot(id){updateTask(id,{parentId:null,order:getRootTasks().length});}
window.promoteToRoot=promoteToRoot;

// ── TAG HELPERS ──────────────────────────────────────────────────
function tagKey(cat,val){return cat+'::'+val;}
function getAllTagValues(cat){
  const v=new Set(state.definedTags[cat]||[]);
  state.tasks.forEach(t=>(t.tags[cat]||[]).forEach(x=>v.add(x)));
  return[...v];
}
function addTagToTask(tid,cat,val){
  const t=getTask(tid);if(!t)return;
  if(!t.tags[cat])t.tags[cat]=[];
  if(!t.tags[cat].includes(val)){t.tags[cat].push(val);getTagColor(cat,val);save();render();renderDetail();}
}
window.addTagToTask=addTagToTask;
function removeTagFromTask(tid,cat,val){
  const t=getTask(tid);if(!t)return;
  t.tags[cat]=(t.tags[cat]||[]).filter(v=>v!==val);
  save();render();renderDetail();
}
window.removeTagFromTask=removeTagFromTask;
function addCategory(name){const n=name.trim();if(!n||state.categories.includes(n))return false;state.categories.push(n);save();return true;}

// ── FILTERS ──────────────────────────────────────────────────────
function toggleFilter(cat,val){
  if(!state.filters[cat])state.filters[cat]=new Set();
  if(state.filters[cat].has(val))state.filters[cat].delete(val);else state.filters[cat].add(val);
  if(state.filters[cat].size===0)delete state.filters[cat];
  render();
}
window.toggleFilter=toggleFilter;
function clearAllFilters(){state.filters={};render();}
window.clearAllFilters=clearAllFilters;
function taskMatchesFilters(task){
  for(const[cat,vals]of Object.entries(state.filters)){
    if(!vals||vals.size===0)continue;
    const tv=task.tags[cat]||[];let m=false;
    for(const v of vals){
      if(v==='__untagged__'){if(tv.length===0){m=true;break;}}
      else if(tv.includes(v)){m=true;break;}
    }
    if(!m)return false;
  }
  return true;
}
function isFilterActive(){return Object.keys(state.filters).length>0;}
function shouldShowTask(t){
  if(taskMatchesFilters(t))return true;
  // If an __untagged__ filter is active and this task IS tagged in that category,
  // never surface it via descendant matching — it explicitly contradicts the filter.
  for(const[cat,vals]of Object.entries(state.filters)){
    if(vals&&vals.has('__untagged__')&&(t.tags[cat]||[]).length>0)return false;
  }
  return getAllDescendants(t.id).some(d=>taskMatchesFilters(d));
}

// ── UTILS ────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function timeAgo(ts){
  if(!ts)return'';const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';if(s<604800)return Math.floor(s/86400)+'d ago';
  return new Date(ts).toLocaleDateString();
}
function fullDate(ts){if(!ts)return'';return new Date(ts).toLocaleString(undefined,{dateStyle:'medium',timeStyle:'short'});}

      for(const v of vals)

// ── STALENESS ────────────────────────────────────────────────────
const STALE_WARN_MS = 7  * 24 * 60 * 60 * 1000; // 7 days
const STALE_CRIT_MS = 14 * 24 * 60 * 60 * 1000; // 14 days

function getStaleness(task){
  // Done/archived/trashed tasks are never flagged
  if(task.done||task.archived||task.trashed) return null;
  const ref = task.updatedAt || task.createdAt || 0;
  const age = Date.now() - ref;
  if(age >= STALE_CRIT_MS) return 'crit';
  if(age >= STALE_WARN_MS) return 'warn';
  return null;
}

function staleAgeLabel(task){
  const ref = task.updatedAt || 0;
  const days = Math.floor((Date.now() - ref) / 86400000);
  if(days < 1)  return 'today';
  if(days < 30) return days+'d';
  if(days < 365) return Math.floor(days/30)+'mo';
  return Math.floor(days/365)+'y';
}

// ── RENDER TASKS ─────────────────────────────────────────────────
function renderTagsHtml(task){
  let html='';
  state.categories.forEach(cat=>{
    (task.tags[cat]||[]).forEach(val=>{
      const c=getTagColor(cat,val);
      html+=`<span class="task-tag" style="border-left-color:${c.accent};" onclick="event.stopPropagation();toggleFilter('${esc(cat)}','${esc(val)}')" title="Filter by ${esc(cat)}: ${esc(val)}"><span class="cat">${esc(cat.substring(0,3))}·</span>${esc(val)}</span>`;
    });
  });
  return html;
}

function renderTaskNode(task){
  // Subtasks are managed in the detail panel only — only root tasks render here
  const children=getChildren(task.id).filter(c=>!c.trashed);
  const hasChildren=children.length>0;
  if(task.archived||task.trashed)return'';
  if(isFilterActive()&&!shouldShowTask(task))return'';
  const doneChildren=children.filter(c=>c.done||c.archived).length;
  const allDone=hasChildren&&doneChildren===children.length;
  const chkExtra=task.done?' on':hasChildren&&!allDone?' chk-partial':'';
  // Staleness
  const stale=getStaleness(task);
  const staleClass=stale?' stale-'+stale:'';
  const staleDot=stale?`<div class="stale-dot stale-${stale}" title="No activity for ${staleAgeLabel(task)}"></div>`:'';
  return`<div class="task-row" data-id="${task.id}">
    <div class="task-item${task.done?' done-task':''}${state.activeTaskId===task.id?' active':''}${staleClass}"
      data-id="${task.id}" draggable="true"
      ondragstart="onDragStart(event,'${task.id}')" ondragover="onDragOver(event,'${task.id}')"
      ondragleave="onDragLeave(event,'${task.id}')" ondrop="onDrop(event,'${task.id}')"
      ondragend="onDragEnd(event)" onclick="selectTask('${task.id}')">
      <div class="task-left">
        ${staleDot}
        <div class="drag-handle"><span></span><span></span><span></span></div>
        <div class="chk${chkExtra}" onclick="event.stopPropagation();toggleDone('${task.id}')" title="${hasChildren&&!allDone?'Complete all subtasks first':task.done?'Mark as active':'Mark complete'}">${task.done?'✓':''}</div>
        <div class="task-content">
          <div class="task-title-row">
            <span class="task-name${task.done?' done':''}">${esc(task.text)}</span>
          </div>
          <div class="task-tags-row">${renderTagsHtml(task)}${hasChildren?`<span class="subtask-count">↳ ${doneChildren}/${children.length}</span>`:''}</div>
        </div>
      </div>
      <div class="task-right">
        <button class="task-action del" title="Move to Trash" onclick="event.stopPropagation();trashTask('${task.id}')">🗑</button>
      </div>
    </div>
  </div>`;
}

window.toggleCollapse=function(id){state.collapsed[id]=!state.collapsed[id];save();render();};
window.startInlineEditTitle=function(id){
  const t=getTask(id);if(!t||t.trashed)return;
  const el=document.querySelector(`.task-item[data-id="${id}"] .task-name`);if(!el)return;
  const inp=document.createElement('input');inp.className='task-name-edit';inp.value=t.text;
  inp.onclick=e=>e.stopPropagation();
  inp.onblur=()=>updateTask(id,{text:inp.value.trim()||t.text});
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=t.text;inp.blur();}};
  el.replaceWith(inp);inp.focus();inp.select();
};
window.selectTask=function(id){
  if(!id){ // clicked Root in breadcrumb — clear selection, scroll to top
    state.activeTaskId=null;
    document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('active'));
    const area=document.getElementById('task-area');
    if(area) area.scrollTop=0;
    renderDetail();
    return;
  }
  state.activeTaskId=id;
  // Opening a task counts as touching it — clears the staleness indicator
  const touched=getTask(id);
  if(touched&&getStaleness(touched)){touched.updatedAt=now();save();}
  document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('active'));
  const el=document.querySelector(`.task-item[data-id="${id}"]`);
  if(el){ el.classList.add('active'); el.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  renderDetail();if(autoOpenPane&&!state.detailOpen)toggleDetail();
};

function renderStatusBadge(s){
  const labels={active:'ACTIVE',done:'DONE',archived:'ARCHIVED',trashed:'TRASHED'};
  return`<span class="task-status-pill ${s}">${labels[s]||s}</span>`;
}

function renderStatusTaskItem(t){
  const s=getTaskStatus(t);
  const isDone=s==='done'||s==='archived';
  const isTrashed=s==='trashed';
  const nameStyle=isDone?'text-decoration:line-through;color:var(--dim);':isTrashed?'text-decoration:line-through;color:var(--dim);':'color:var(--text);';
  let actions='';
  if(s==='archived')actions=`<button class="task-action" style="opacity:1;font-size:10px;" onclick="event.stopPropagation();unarchiveTask('${t.id}')">↩ Restore</button>`;
  if(s==='trashed')actions=`<button class="task-action" style="opacity:1;font-size:10px;color:#06D6A0;" onclick="event.stopPropagation();restoreTask('${t.id}')">↩ Restore</button>`;
  if(s==='active'||s==='done')actions=`<button class="task-action del" title="Move to Trash" onclick="event.stopPropagation();trashTask('${t.id}')">🗑</button>`;
  return`<div class="task-row"><div class="task-item${isDone||isTrashed?' done-task':''}${state.activeTaskId===t.id?' active':''}" data-id="${t.id}" onclick="selectTask('${t.id}')">
    <div class="task-left">
      <div class="chk${isDone?' on':''}" style="${isTrashed?'opacity:.35;cursor:default;':''}" onclick="event.stopPropagation();${!isTrashed?`toggleDone('${t.id}')`:''}">${isDone?'✓':''}</div>
      <div class="task-content">
        <div class="task-title-row"><span class="task-name" style="${nameStyle}">${esc(t.text)}</span>${renderStatusBadge(s)}</div>
        <div class="task-tags-row">${renderTagsHtml(t)}</div>
      </div>
    </div>
    <div class="task-right">${actions}</div>
  </div></div>`;
}

function renderTasks(){
  const area=document.getElementById('task-area');

  // ── STATUS FILTER overrides tab view ────────────────────────────
  if(isStatusFilterActive()){
    let tasks=state.tasks.filter(t=>statusFilter.has(getTaskStatus(t)));
    if(isFilterActive())tasks=tasks.filter(t=>taskMatchesFilters(t));
    if(isSearchActive())tasks=tasks.filter(t=>taskMatchesSearch(t));
    tasks.sort((a,b)=>(a.order||0)-(b.order||0));
    if(!tasks.length){area.innerHTML=`<div class="empty-state"><div class="big">◎</div><h3>No matches</h3><p>No tasks found for the selected status${isSearchActive()||isFilterActive()?' with current filters':''}</p></div>`;return;}
    area.innerHTML=tasks.map(t=>renderStatusTaskItem(t)).join('');
    return;
  }

  if(currentView==='archive'){
    let archived=state.tasks.filter(t=>t.archived&&!t.trashed).sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));
    if(isSearchActive())archived=archived.filter(t=>taskMatchesSearch(t));
    if(!archived.length){area.innerHTML=`<div class="empty-state"><div class="big">✓</div><h3>${isSearchActive()?'No matches':'No archived tasks'}</h3><p>${isSearchActive()?'No archived tasks match your search':'Completed tasks land here'}</p></div>`;return;}
    area.innerHTML=archived.map(t=>`<div class="task-row"><div class="task-item done-task${state.activeTaskId===t.id?' active':''}" data-id="${t.id}" onclick="selectTask('${t.id}')">
      <div class="task-left">
        <div class="chk on" onclick="event.stopPropagation();unarchiveTask('${t.id}')">✓</div>
        <div class="task-content">
          <div class="task-title-row"><span class="task-name done">${esc(t.text)}</span></div>
          <div class="task-tags-row">${renderTagsHtml(t)}<span style="font-size:9px;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-left:2px;">${t.completedAt?'· ✓ '+fullDate(t.completedAt):''}</span></div>
        </div>
      </div>
      <div class="task-right">
        <button class="task-action" style="opacity:1;font-size:10px;" onclick="event.stopPropagation();unarchiveTask('${t.id}')">↩ Restore</button>
        <button class="task-action del" style="opacity:1;" onclick="event.stopPropagation();trashTask('${t.id}')">🗑</button>
      </div>
    </div></div>`).join('');
    return;
  }
  if(currentView==='trash'){
    let trashed=state.tasks.filter(t=>t.trashed).sort((a,b)=>(b.trashedAt||0)-(a.trashedAt||0));
    if(isSearchActive())trashed=trashed.filter(t=>taskMatchesSearch(t));
    if(!trashed.length){area.innerHTML=`<div class="empty-state"><div class="big">🗑</div><h3>${isSearchActive()?'No matches':'Trash is empty'}</h3><p>${isSearchActive()?'No trashed tasks match your search':'Deleted tasks live here forever — never permanently lost'}</p></div>`;return;}
    area.innerHTML=trashed.map(t=>`<div class="task-row"><div class="task-item deleted-card${state.activeTaskId===t.id?' active':''}" data-id="${t.id}" onclick="selectTask('${t.id}')">
      <div class="task-left">
        <div class="chk" style="opacity:.35;cursor:default;"></div>
        <div class="task-content">
          <div class="task-title-row"><span class="task-name" style="text-decoration:line-through;color:var(--dim);">${esc(t.text)}</span></div>
          <div class="task-tags-row">${renderTagsHtml(t)}<span style="font-size:9px;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-left:2px;">${t.trashedAt?'· Trashed '+timeAgo(t.trashedAt):''}</span></div>
        </div>
      </div>
      <div class="task-right">
        <button class="task-action" style="opacity:1;font-size:10px;color:#06D6A0;" onclick="event.stopPropagation();restoreTask('${t.id}')">↩ Restore</button>
      </div>
    </div></div>`).join('');
    return;
  }
  // Active view: undone tasks maintain order, done tasks sink to bottom
  const allRoots=state.tasks.filter(t=>!t.parentId&&!t.archived&&!t.trashed)
    .sort((a,b)=>(a.order||0)-(b.order||0));
  if(!allRoots.length){area.innerHTML=`<div class="empty-state"><div class="big">◈</div><h3>No tasks yet</h3><p>Type a task title above and press Enter</p></div>`;return;}
  const undone=allRoots.filter(t=>!t.done);
  const done=allRoots.filter(t=>t.done);
  let filteredUndone=isFilterActive()?undone.filter(r=>shouldShowTask(r)):undone;
  let filteredDone=isFilterActive()?done.filter(r=>shouldShowTask(r)):done;
  if(isSearchActive()){
    filteredUndone=filteredUndone.filter(r=>taskOrDescendantMatchesSearch(r));
    filteredDone=filteredDone.filter(r=>taskOrDescendantMatchesSearch(r));
  }
  if(!filteredUndone.length&&!filteredDone.length){area.innerHTML=`<div class="empty-state"><div class="big">◎</div><h3>No matches</h3><p>No tasks match the active ${isSearchActive()?'search':'filters'}</p></div>`;return;}
  let html=filteredUndone.map(t=>renderTaskNode(t)).join('');
  if(filteredDone.length){
    html+=`<div class="done-section-label">COMPLETED (${filteredDone.length})</div>`;
    html+=filteredDone.map(t=>renderTaskNode(t)).join('');
  }
  area.innerHTML=html;
}

function render(){
  renderFilters();
  if(appMode==='kanban'){ populateKanbanCatSelect(); renderKanban(); }
  else renderTasks();
}

window.setView=function(v){
  currentView=v;
  ['active','archive','trash'].forEach(n=>{const t=document.getElementById('tab-'+n);if(t)t.classList.toggle('active',n===v);});
  renderTasks();
};

// ── APP MODE: list | kanban ───────────────────────────────────────
let appMode='list';

window.setAppMode=function(mode){
  appMode=mode;
  const listMain=document.getElementById('main');
  const kanbanPage=document.getElementById('kanban-page');
  const detailPanel=document.getElementById('detail');
  document.getElementById('vmode-list').classList.toggle('active',mode==='list');
  document.getElementById('vmode-kanban').classList.toggle('active',mode==='kanban');

  if(mode==='kanban'){
